<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <!-- CÁC THẺ HỖ TRỢ PWA VÀ iOS -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1e40af">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Phác đồ SXH">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/2966/2966327.png">

    <title>Y Lệnh Truyền Dịch SXHD (QĐ 2760/QĐ-BYT)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Segoe UI', '-apple-system', Roboto, Helvetica, Arial, sans-serif; background-color: #f3f4f6; }
        .hidden { display: none; }
        select, button, input { -webkit-appearance: none; appearance: none; outline: none; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-5xl mx-auto bg-white rounded-xl shadow-lg overflow-hidden pb-8">
        <div class="bg-blue-800 text-white p-6 text-center relative">
            <h1 class="text-2xl font-bold">CÔNG CỤ TÍNH Y LỆNH TRUYỀN DỊCH SỐT XUẤT HUYẾT</h1>
            <p class="text-sm mt-2 text-blue-100">Dựa trên Quyết định 2760/QĐ-BYT ngày 04/07/2023 của Bộ Y tế</p>
            
            <!-- Nút cài đặt App (Chỉ hiện khi trình duyệt hỗ trợ PWA) -->
            <button id="installBtn" class="hidden mt-4 mx-auto bg-green-500 hover:bg-green-600 text-white font-bold py-2 px-6 rounded-full shadow-md flex items-center justify-center transition-colors">
                <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
                Cài đặt Ứng dụng (Offline)
            </button>
        </div>

        <div class="p-6 grid grid-cols-1 md:grid-cols-12 gap-6">
            <div class="space-y-4 md:col-span-4 border-b md:border-b-0 md:border-r-2 border-gray-100 pb-6 md:pb-0 md:pr-6">
                <h2 class="text-xl font-semibold text-gray-800 border-b pb-2">1. Thông tin Bệnh nhân</h2>
                
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Độ tuổi</label>
                    <select id="ageGroup" onchange="toggleInputs()" class="w-full border border-gray-300 rounded-md p-3 bg-white focus:ring-blue-500 focus:border-blue-500">
                        <option value="adult">Người lớn (≥ 16 tuổi)</option>
                        <option value="adolescent">Thanh thiếu niên (13 - < 16 tuổi)</option>
                        <option value="child">Trẻ em (< 13 tuổi)</option>
                    </select>
                </div>

                <div id="genderDiv">
                    <label class="block text-sm font-medium text-gray-700 mb-1">Giới tính (Tính CN lý tưởng)</label>
                    <select id="gender" class="w-full border border-gray-300 rounded-md p-3 bg-white">
                        <option value="male">Nam</option>
                        <option value="female">Nữ</option>
                    </select>
                </div>

                <div id="heightDiv">
                    <label class="block text-sm font-medium text-gray-700 mb-1">Chiều cao (cm)</label>
                    <input type="number" id="height" placeholder="Ví dụ: 165" class="w-full border border-gray-300 rounded-md p-3">
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Cân nặng thực tế (kg)</label>
                    <input type="number" id="weight" placeholder="Ví dụ: 60" class="w-full border border-gray-300 rounded-md p-3">
                </div>

                <div id="obeseChildDiv" class="hidden bg-yellow-50 p-4 rounded-md border border-yellow-200">
                    <label class="flex items-center text-sm font-medium text-gray-700 mb-2">
                        <input type="checkbox" id="isObeseChild" onchange="toggleObeseChild()" class="mr-2 h-5 w-5 text-blue-600 rounded">
                        Trẻ béo phì?
                    </label>
                    <div id="childIdealWeightDiv" class="hidden mt-3">
                        <label class="block text-xs font-medium text-gray-700 mb-1">Cân nặng chuẩn theo tuổi (CDC):</label>
                        <input type="number" id="childIdealWeight" placeholder="Ví dụ: 18" class="w-full border border-gray-300 rounded-md p-3 text-sm">
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Tình trạng lâm sàng</label>
                    <select id="severity" class="w-full border border-gray-300 rounded-md p-3 bg-white font-semibold text-red-600">
                        <option value="warning">Có dấu hiệu cảnh báo</option>
                        <option value="shock">Sốc SXHD</option>
                        <option value="severe_shock">Sốc Nặng (M=0, HA=0 / Tụt kẹt nặng)</option>
                    </select>
                </div>

                <button onclick="initCalculation()" class="w-full bg-blue-700 hover:bg-blue-800 text-white font-bold py-4 px-4 rounded-md transition duration-200 shadow-md active:bg-blue-900">
                    TẠO Y LỆNH
                </button>
            </div>

            <div class="space-y-4 md:col-span-8">
                <h2 class="text-xl font-semibold text-gray-800 border-b pb-2">2. Chi tiết Y lệnh</h2>
                
                <div id="resultBox" class="hidden">
                    <div class="bg-blue-50 p-4 rounded-md border border-blue-200 mb-4 flex justify-between items-center">
                        <div>
                            <h3 class="font-bold text-gray-700">Cân nặng làm tròn tính dịch: <span id="calcWeightText" class="text-xl text-blue-700"></span></h3>
                            <p id="calcNoteText" class="text-sm text-gray-600 mt-1 italic"></p>
                        </div>
                    </div>

                    <div id="prescriptionList" class="space-y-4"></div>
                </div>
                
                <div id="emptyState" class="text-center text-gray-400 mt-10">
                    <svg class="mx-auto h-12 w-12 mb-2 text-gray-300" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
                    </svg>
                    <p>Nhập thông tin và bấm nút để tạo y lệnh</p>
                </div>
            </div>
        </div>
    </div>

    <!-- SCRIPT ĐĂNG KÝ SERVICE WORKER (CHO PWA) VÀ LOGIC TÍNH TOÁN -->
    <script>
        // 1. ĐĂNG KÝ SERVICE WORKER ĐỂ CHẠY OFFLINE
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(reg => console.log('Service Worker registered successfully.', reg))
                    .catch(err => console.log('Service Worker registration failed:', err));
            });
        }

        // 2. XỬ LÝ NÚT CÀI ĐẶT APP (A2HS - Add to Home Screen)
        let deferredPrompt;
        const installBtn = document.getElementById('installBtn');

        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            installBtn.classList.remove('hidden'); // Hiện nút khi trình duyệt cho phép cài
        });

        installBtn.addEventListener('click', async () => {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                if (outcome === 'accepted') {
                    installBtn.classList.add('hidden');
                }
                deferredPrompt = null;
            }
        });

        // ==========================================
        // 3. LOGIC TÍNH TOÁN Y LỆNH (GIỮ NGUYÊN)
        // ==========================================
        let currentRegimen = [];
        let currentCalcWeight = 0;

        function toggleInputs() {
            const ageGroup = document.getElementById('ageGroup').value;
            const genderDiv = document.getElementById('genderDiv');
            const heightDiv = document.getElementById('heightDiv');
            const obeseChildDiv = document.getElementById('obeseChildDiv');
            
            if (ageGroup === 'adult') {
                genderDiv.classList.remove('hidden');
                heightDiv.classList.remove('hidden');
                obeseChildDiv.classList.add('hidden');
            } else {
                genderDiv.classList.add('hidden');
                heightDiv.classList.add('hidden');
                obeseChildDiv.classList.remove('hidden');
            }
        }

        function toggleObeseChild() {
            const isObese = document.getElementById('isObeseChild').checked;
            const childIdealWeightDiv = document.getElementById('childIdealWeightDiv');
            if (isObese) {
                childIdealWeightDiv.classList.remove('hidden');
            } else {
                childIdealWeightDiv.classList.add('hidden');
            }
        }

        function copyToClipboard(button, elementId) {
            const copyElement = document.getElementById(elementId);
            const textToCopy = copyElement.innerText;

            navigator.clipboard.writeText(textToCopy).then(() => {
                const originalText = button.innerText;
                button.innerText = "Đã Copy!";
                button.classList.add("bg-green-600", "text-white", "border-green-600");
                button.classList.remove("bg-white", "text-blue-700");
                setTimeout(() => {
                    button.innerText = originalText;
                    button.classList.remove("bg-green-600", "text-white", "border-green-600");
                    button.classList.add("bg-white", "text-blue-700");
                }, 2000);
            }).catch(err => {
                alert("Trình duyệt không hỗ trợ copy tự động. Vui lòng copy thủ công.");
            });
        }

        function initCalculation() {
            const ageGroup = document.getElementById('ageGroup').value;
            const weight = parseFloat(document.getElementById('weight').value);
            const severity = document.getElementById('severity').value;
            
            if (!weight || weight <= 0) {
                alert("Vui lòng nhập cân nặng hợp lệ!");
                return;
            }

            let calcWeightRaw = weight;
            let note = "";

            if (ageGroup === 'adult') {
                const height = parseFloat(document.getElementById('height').value);
                if (!height || height <= 0) {
                    alert("Vui lòng nhập chiều cao để tính BMI cho người lớn!");
                    return;
                }
                const gender = document.getElementById('gender').value;
                const heightM = height / 100;
                const bmi = weight / (heightM * heightM);

                if (bmi >= 25) {
                    let idealWeight = gender === 'male' ? 50.0 + 0.91 * (height - 152.4) : 45.5 + 0.91 * (height - 152.4);
                    calcWeightRaw = idealWeight + 0.4 * (weight - idealWeight);
                    note = `BMI = ${bmi.toFixed(1)} (Thừa cân). Đã áp dụng Cân nặng hiệu chỉnh & làm tròn.`;
                } else {
                    note = `BMI = ${bmi.toFixed(1)} (<25). Dùng cân nặng thực tế làm tròn.`;
                }
            } else {
                const isObese = document.getElementById('isObeseChild').checked;
                if (isObese) {
                    const idealW = parseFloat(document.getElementById('childIdealWeight').value);
                    if (!idealW || idealW <= 0) {
                        alert("Vui lòng nhập Cân nặng chuẩn theo tuổi cho trẻ!");
                        return;
                    }
                    calcWeightRaw = idealW;
                    note = "Sử dụng Cân nặng chuẩn theo tuổi (Đã làm tròn).";
                } else {
                    note = "Sử dụng Cân nặng thực tế làm tròn.";
                }
            }

            currentCalcWeight = Math.round(calcWeightRaw);
            document.getElementById('calcWeightText').innerText = `${currentCalcWeight} kg`;
            document.getElementById('calcNoteText').innerText = note;

            const clsWarning = "<strong>Theo dõi:</strong>\n- Lâm sàng: Đo mạch, HA, nhịp thở, nước tiểu mỗi 1-2h.\n- Cận lâm sàng: Thử Hct mỗi 2-4h.";
            const clsWarningLate = "<strong>Theo dõi:</strong>\n- Lâm sàng: Đo mạch, HA, nhịp thở, nước tiểu mỗi 4-6h.\n- Cận lâm sàng: Thử Hct mỗi 4-6h.";
            const clsShockStart = "<strong>Theo dõi:</strong>\n- Lâm sàng: Mạch, HA mỗi 30p-1h. Nước tiểu mỗi 1h.\n- Cận lâm sàng: CTM, Nhóm máu chéo, Đường huyết, Khí máu ĐM, Lactate, Chức năng gan, Thận, Điện giải đồ, Đông máu toàn bộ. Thử Hct mỗi 1h.";
            const clsShockMid = "<strong>Theo dõi:</strong>\n- Lâm sàng: Đo mạch, HA mỗi 1-2h.\n- Cận lâm sàng: Thử Hct mỗi 2h.";
            const clsSevereShockStart = "<strong>Theo dõi:</strong>\n- Lâm sàng: Mạch, HA liên tục hoặc mỗi 15p.\n- Cận lâm sàng: CTM, Nhóm máu, Đường huyết, Lactate, Khí máu ĐM, Sinh hóa. Thử Hct mỗi 1h.";
            const clsSevereShockMid1 = "<strong>Theo dõi:</strong>\n- Lâm sàng: Đo mạch, HA mỗi 30p.\n- Cận lâm sàng: Thử Hct mỗi 1h.";
            const clsSevereShockMid2 = "<strong>Theo dõi:</strong>\n- Lâm sàng: Đo mạch, HA mỗi 15-30p.\n- Cận lâm sàng: Thử Hct mỗi 1h.";

            const noteWarning = "Đánh giá lại: Nếu sinh hiệu ổn định, Hct giảm -> Chuyển mốc dịch tiếp theo (hoặc ngưng nếu đủ 24-48h). \nNếu diễn tiến xấu (vật vã, lừ đừ, lạnh tay chân, mạch nhanh nhỏ, HA tụt/kẹt, Hct tăng cao) -> Chuyển phác đồ SỐC SXHD.";
            const noteShock = "Đánh giá lại: Nếu ra sốc (M, HA ổn, nước tiểu tốt) -> Giảm liều theo mốc tiếp theo. \nNếu Hct tăng hoặc giảm < 20% nhưng sinh hiệu không đổi/xấu đi -> Xem xét đổi CAO PHÂN TỬ. \nNếu Hct giảm > 20% + Sinh hiệu không ổn định -> Xem xét truyền máu / chế phẩm máu.";
            const noteSevereShock = "Đánh giá lại: Nếu mạch, HA đo được (ra sốc nặng) -> Chuyển truyền Cao phân tử 10 ml/kg/h. \nNếu mạch, HA vẫn không đo được -> Bơm tĩnh mạch tiếp Cao phân tử hoặc phối hợp vận mạch/truyền máu theo chỉ định.";

            let regimen = [];

            if (ageGroup === 'adult') {
                if (severity === 'warning') {
                    regimen = [
                        { optionsT: [1, 2], optionsR: [6], fluid: "RL_NaCl", fluidName: "Ringer Lactate hoặc NaCl 0.9%", cls: clsWarning, note: noteWarning },
                        { optionsT: [2, 3, 4], optionsR: [3], fluid: "RL_NaCl", fluidName: "Ringer Lactate hoặc NaCl 0.9%", cls: clsWarning, note: noteWarning },
                        { optionsT: [6, 8, 10, 12, 18], optionsR: [1.5], fluid: "RL_NaCl", fluidName: "Ringer Lactate hoặc NaCl 0.9%", cls: clsWarningLate, note: noteWarning }
                    ];
                } else if (severity === 'shock') {
                    regimen = [
                        { optionsT: [1], optionsR: [15], fluid: "RL_NaCl", fluidName: "Ringer Lactate hoặc NaCl 0.9%", cls: clsShockStart, note: noteShock },
                        { optionsT: [2], optionsR: [10], fluid: "RL_NaCl", fluidName: "Ringer Lactate hoặc NaCl 0.9%", cls: clsShockMid, note: noteShock },
                        { optionsT: [2], optionsR: [6], fluid: "RL_NaCl", fluidName: "Ringer Lactate hoặc NaCl 0.9%", cls: clsShockMid, note: noteShock },
                        { optionsT: [5, 6, 7], optionsR: [3], fluid: "RL_NaCl", fluidName: "Ringer Lactate hoặc NaCl 0.9%", cls: clsWarningLate, note: noteWarning },
                        { optionsT: [12], optionsR: [1.5], fluid: "RL_NaCl", fluidName: "Ringer Lactate hoặc NaCl 0.9%", cls: clsWarningLate, note: noteWarning }
                    ];
                } else if (severity === 'severe_shock') {
                    regimen = [
                        { optionsT: [15], optionsR: [15], isBolus: true, fluid: "RL_NaCl", fluidName: "Ringer Lactate hoặc NaCl 0.9%", cls: clsSevereShockStart, note: noteSevereShock },
                        { optionsT: [1], optionsR: [15], fluid: "CPT", fluidName: "Cao phân tử (Gelofusine/Voluven...)", cls: clsSevereShockMid1, note: noteShock },
                        { optionsT: [1], optionsR: [15], fluid: "RL_NaCl", fluidName: "Ringer Lactate hoặc NaCl 0.9% (Nếu sốc ra)", cls: clsShockMid, note: noteWarning }
                    ];
                }
            } else if (ageGroup === 'adolescent') {
                if (severity === 'warning') {
                    regimen = [
                        { optionsT: [1, 2], optionsR: [6, 7], fluid: "RL_NaCl", fluidName: "Ringer Lactate / NaCl 0.9%", cls: clsWarning, note: noteWarning },
                        { optionsT: [1, 2], optionsR: [5], fluid: "RL_NaCl", fluidName: "Ringer Lactate / NaCl 0.9%", cls: clsWarning, note: noteWarning },
                        { optionsT: [2, 3, 4], optionsR: [3], fluid: "RL_NaCl", fluidName: "Ringer Lactate / NaCl 0.9%", cls: clsWarning, note: noteWarning },
                        { optionsT: [4, 6, 8, 10, 12], optionsR: [1.5], fluid: "RL_NaCl", fluidName: "Ringer Lactate / NaCl 0.9%", cls: clsWarningLate, note: noteWarning }
                    ];
                } else if (severity === 'shock') {
                    regimen = [
                        { optionsT: [1], optionsR: [20], fluid: "RL_NaCl", fluidName: "Ringer Lactate / NaCl 0.9%", cls: clsShockStart, note: noteShock },
                        { optionsT: [1], optionsR: [10], fluid: "RL_NaCl", fluidName: "Ringer Lactate / NaCl 0.9%", cls: clsShockMid, note: noteShock },
                        { optionsT: [1], optionsR: [7.5], fluid: "RL_NaCl", fluidName: "Ringer Lactate / NaCl 0.9%", cls: clsShockMid, note: noteShock },
                        { optionsT: [1], optionsR: [5], fluid: "RL_NaCl", fluidName: "Ringer Lactate / NaCl 0.9%", cls: clsShockMid, note: noteShock },
                        { optionsT: [4, 5, 6], optionsR: [3], fluid: "RL_NaCl", fluidName: "Ringer Lactate / NaCl 0.9%", cls: clsWarningLate, note: noteWarning }
                    ];
                } else if (severity === 'severe_shock') {
                    regimen = [
                        { optionsT: [15, 30], optionsR: [20], isBolus: true, fluid: "RL_NaCl", fluidName: "Ringer Lactate / NaCl 0.9%", cls: clsSevereShockStart, note: noteSevereShock },
                        { optionsT: [1], optionsR: [10], fluid: "CPT", fluidName: "Cao phân tử (Nếu Mạch rõ, HA bt)", cls: clsSevereShockMid1, note: noteShock },
                        { optionsT: [1], optionsR: [15, 20], fluid: "CPT", fluidName: "Cao phân tử (Nếu HA vẫn kẹt/giảm)", cls: clsSevereShockMid2, note: noteShock }
                    ];
                }
            } else if (ageGroup === 'child') {
                if (severity === 'warning') {
                    regimen = [
                        { optionsT: [1, 2, 3], optionsR: [6, 7], fluid: "RL_NaCl", fluidName: "Ringer Lactate / NaCl 0.9%", cls: clsWarning, note: noteWarning },
                        { optionsT: [2, 3, 4], optionsR: [5], fluid: "RL_NaCl", fluidName: "Ringer Lactate / NaCl 0.9%", cls: clsWarning, note: noteWarning },
                        { optionsT: [2, 3, 4], optionsR: [3], fluid: "RL_NaCl", fluidName: "Ringer Lactate / NaCl 0.9%", cls: clsWarningLate, note: noteWarning }
                    ];
                } else if (severity === 'shock') {
                    regimen = [
                        { optionsT: [1], optionsR: [20], fluid: "RL_NaCl", fluidName: "Ringer Lactate / NaCl 0.9%", cls: clsShockStart, note: noteShock },
                        { optionsT: [1, 2], optionsR: [10], fluid: "RL_NaCl", fluidName: "Ringer Lactate / NaCl 0.9%", cls: clsShockMid, note: noteShock },
                        { optionsT: [1, 2], optionsR: [7.5], fluid: "RL_NaCl", fluidName: "Ringer Lactate / NaCl 0.9%", cls: clsShockMid, note: noteShock },
                        { optionsT: [3, 4], optionsR: [5], fluid: "RL_NaCl", fluidName: "Ringer Lactate / NaCl 0.9%", cls: clsWarningLate, note: noteWarning }
                    ];
                } else if (severity === 'severe_shock') {
                    regimen = [
                        { optionsT: [15, 30], optionsR: [20], isBolus: true, fluid: "RL_NaCl", fluidName: "Ringer Lactate / NaCl 0.9%", cls: clsSevereShockStart, note: noteSevereShock },
                        { optionsT: [1], optionsR: [10], fluid: "CPT", fluidName: "Cao phân tử (Nếu Mạch rõ, HA bt)", cls: clsSevereShockMid1, note: noteShock },
                        { optionsT: [1], optionsR: [15, 20], fluid: "CPT", fluidName: "Cao phân tử (Nếu HA kẹt/giảm)", cls: clsSevereShockMid2, note: noteShock }
                    ];
                }
            }

            currentRegimen = regimen.map(step => ({
                ...step,
                selectedT: step.optionsT[0],
                selectedR: step.optionsR[0]
            }));

            document.getElementById('emptyState').classList.add('hidden');
            document.getElementById('resultBox').classList.remove('hidden');
            
            renderRegimen();
        }

        function updateStep(index, field, value) {
            currentRegimen[index][field] = parseFloat(value);
            renderRegimen(); 
        }

        function renderRegimen() {
            const listContainer = document.getElementById('prescriptionList');
            listContainer.innerHTML = '';

            let fluidState = {
                "RL_NaCl": { remain: 0, count: 0 },
                "CPT": { remain: 0, count: 0 }
            };

            currentRegimen.forEach((step, index) => {
                let fKey = step.fluid;
                
                let rateVol = Math.round(step.selectedR * currentCalcWeight);
                let totalVol = 0;
                let calculationLine = "";

                if (step.isBolus) {
                    totalVol = rateVol; 
                    calculationLine = `<strong>= ${totalVol} mL trong ${step.selectedT} phút</strong> (Bơm TM trực tiếp / Truyền nhanh)`;
                } else {
                    totalVol = Math.round(rateVol * step.selectedT);
                    calculationLine = `<strong>= ${rateVol} mL/h x ${step.selectedT} (h)\n=> Tổng: ${totalVol} mL</strong>`;
                }

                let prevRemain = fluidState[fKey].remain;
                let neededNew = totalVol - prevRemain;
                let bagsToAdd = 0;
                
                if (neededNew > 0) {
                    bagsToAdd = Math.ceil(neededNew / 500);
                }
                
                let totalAvailable = prevRemain + (bagsToAdd * 500);
                let newRemain = totalAvailable - totalVol;

                let bagStr = "";
                if (bagsToAdd > 0) {
                    let startBag = fluidState[fKey].count + 1;
                    let endBag = fluidState[fKey].count + bagsToAdd;
                    bagStr = startBag === endBag ? `Chai số ${startBag}` : `Chai số ${startBag}-${endBag}`;
                    fluidState[fKey].count += bagsToAdd;
                } else {
                    bagStr = `Dùng tiếp dịch dư đang truyền`;
                }
                
                fluidState[fKey].remain = newRemain;

                let timeSelectHtml = '';
                if (step.optionsT.length > 1) {
                    let unit = step.isBolus ? "phút" : "giờ";
                    timeSelectHtml = `<select onchange="updateStep(${index}, 'selectedT', this.value)" class="ml-2 border border-blue-400 rounded p-1 text-sm bg-white text-blue-900 font-bold focus:ring focus:ring-blue-200 cursor-pointer">`;
                    step.optionsT.forEach(t => {
                        timeSelectHtml += `<option value="${t}" ${step.selectedT === t ? 'selected' : ''}>${t} ${unit}</option>`;
                    });
                    timeSelectHtml += `</select>`;
                } else {
                    let unit = step.isBolus ? "phút" : "giờ";
                    timeSelectHtml = `<span class="ml-2 font-bold">${step.selectedT} ${unit}</span>`;
                }

                let rateSelectHtml = '';
                if (step.optionsR.length > 1) {
                    rateSelectHtml = `<select onchange="updateStep(${index}, 'selectedR', this.value)" class="border border-gray-400 rounded px-1 py-0.5 text-sm bg-white text-gray-900 font-bold focus:ring focus:ring-blue-200 cursor-pointer">`;
                    step.optionsR.forEach(r => {
                        rateSelectHtml += `<option value="${r}" ${step.selectedR === r ? 'selected' : ''}>${r}</option>`;
                    });
                    rateSelectHtml += `</select>`;
                } else {
                    rateSelectHtml = `<strong>${step.selectedR}</strong>`;
                }

                const prescriptionId = `order_${index}`;
                const card = document.createElement('div');
                card.className = "bg-white border border-gray-300 rounded-lg shadow-sm overflow-hidden relative";
                
                card.innerHTML = `
                    <div class="bg-blue-50 border-b border-blue-100 px-4 py-3 flex justify-between items-center">
                        <div class="flex items-center text-sm md:text-base">
                            <span class="font-bold text-blue-800 whitespace-nowrap">Mốc ${index + 1}: Chọn TG </span>
                            ${timeSelectHtml}
                        </div>
                        <button onclick="copyToClipboard(this, '${prescriptionId}')" class="bg-white hover:bg-gray-50 text-blue-700 text-xs font-bold py-2 px-3 border border-blue-300 rounded shadow-sm transition-colors z-10 whitespace-nowrap ml-2 active:bg-gray-200">
                            Copy Y Lệnh
                        </button>
                    </div>
                    
                    <div class="p-4 bg-white overflow-x-auto">
                        <div id="${prescriptionId}" class="font-mono text-[14px] text-gray-900 whitespace-pre-wrap leading-relaxed m-0"><strong>Loại dịch: ${step.fluidName} (${bagStr})</strong>
(TTM) qua MĐG ${rateSelectHtml} <strong>ml/kg/h</strong>
${calculationLine}
---------------------------------
Dịch dư cũ: ${prevRemain} mL + (${bagsToAdd} chai x 500mL) = ${totalAvailable} mL. 
Trừ đi lượng truyền ${totalVol} mL => Dư sang mốc sau: <span class="text-red-600 font-bold">${newRemain} mL</span>.
---------------------------------
${step.cls}</div>
                        
                        <div class="mt-4 pt-3 border-t border-dashed border-red-200">
                            <div class="bg-red-50 text-red-900 text-sm p-3 rounded-md border border-red-200 flex items-start">
                                <svg class="w-5 h-5 mr-2 flex-shrink-0 text-red-600 mt-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                                </svg>
                                <div>
                                    <strong>Lưu ý:</strong> ${step.note}
                                </div>
                            </div>
                        </div>
                    </div>
                `;
                listContainer.appendChild(card);
            });
        }
    </script>
</body>
</html>
