<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auto Note - Bệnh Án SOAP Thông Minh</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        .disease-group, .lab-group { display: none; }
        .disease-group.active, .lab-group.active { display: flex; }
    </style>
</head>
<body class="bg-slate-100 p-4 font-sans text-gray-800">

    <div class="max-w-7xl mx-auto bg-white rounded-xl shadow-lg p-5 border-t-4 border-blue-600">
        <!-- HEADER & QUẢN LÝ BỆNH NHÂN -->
        <div class="flex flex-wrap justify-between items-center border-b pb-4 mb-5 gap-4">
            <h1 class="text-2xl font-bold text-blue-800 flex items-center">
                <span class="mr-2">🏥</span> EMR Quick-SOAP
            </h1>
            
            <div class="flex items-center space-x-2 bg-slate-50 p-2 rounded-lg border border-slate-200 shadow-sm">
                <label class="text-sm font-semibold text-slate-600">Giường/Mã BN:</label>
                <input type="text" id="bedNumber" placeholder="VD: G12 hoặc 12345" class="border rounded px-2 py-1.5 w-32 outline-none focus:ring-2 focus:ring-blue-400 text-sm font-bold text-blue-700 uppercase">
                <button id="btnLoad" class="bg-slate-200 text-slate-700 px-3 py-1.5 rounded hover:bg-slate-300 font-medium text-sm transition">Tải lại</button>
                <button id="btnSave" class="bg-blue-600 text-white px-3 py-1.5 rounded hover:bg-blue-700 font-medium text-sm transition">💾 Lưu ca này</button>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-5 gap-6">
            <!-- CỘT TRÁI: FORM NHẬP LIỆU -->
            <div class="lg:col-span-3 space-y-5">
                
                <!-- CHỌN MẶT BỆNH -->
                <div class="flex items-center space-x-3 bg-blue-50 p-2 rounded border border-blue-100">
                    <label class="font-bold text-sm text-blue-800">CẬP NHẬT PHÁC ĐỒ THEO BỆNH:</label>
                    <select id="diseaseType" class="border border-blue-300 rounded p-1.5 bg-white focus:ring-2 focus:ring-blue-500 outline-none text-sm font-medium flex-1">
                        <option value="digestive">Nhiễm trùng tiêu hóa</option>
                        <option value="dengue">Sốt xuất huyết Dengue</option>
                        <option value="respiratory">Nhiễm trùng hô hấp</option>
                    </select>
                </div>

                <!-- [S] CƠ NĂNG -->
                <div class="bg-amber-50 p-3 rounded border border-amber-200">
                    <h3 class="font-bold text-amber-800 mb-2 text-sm">(S) Triệu chứng cơ năng</h3>
                    <div class="flex flex-wrap items-center gap-3 text-sm">
                        <div class="flex items-center space-x-1 bg-white px-2 py-1.5 border rounded shadow-sm">
                            <input type="checkbox" id="chk_sot" class="w-4 h-4 text-blue-600 update-trigger" tabindex="1">
                            <label for="chk_sot" class="font-medium cursor-pointer">Sốt N</label>
                            <input type="number" id="day_sot" min="1" class="w-12 border-b border-slate-300 text-center outline-none update-trigger font-semibold text-red-600" tabindex="2">
                        </div>

                        <!-- Tiêu hóa -->
                        <div id="grp_digestive" class="disease-group active flex-wrap gap-3">
                            <div class="flex items-center space-x-1 bg-white px-2 py-1.5 border rounded shadow-sm">
                                <input type="checkbox" id="chk_tieulong" class="w-4 h-4 update-trigger" tabindex="3">
                                <label for="chk_tieulong" class="cursor-pointer">Tiêu lỏng</label>
                                <input type="number" id="count_tieulong" placeholder="Lần/ng" class="w-14 border-b border-slate-300 text-center outline-none update-trigger text-blue-600 font-semibold" tabindex="4">
                            </div>
                            
                            <!-- Nâng cấp cụm Đau Bụng -->
                            <div class="flex items-center space-x-1 bg-white px-2 py-1.5 border rounded shadow-sm">
                                <input type="checkbox" id="chk_daubung" class="w-4 h-4 update-trigger" tabindex="5">
                                <label for="chk_daubung" class="cursor-pointer">Đau bụng</label>
                                <select id="loc_daubung" class="outline-none border-b update-trigger text-xs text-red-600 font-semibold ml-1" tabindex="6">
                                    <option value="thượng vị">thượng vị</option>
                                    <option value="quanh rốn">quanh rốn</option>
                                    <option value="hố chậu P">hố chậu P</option>
                                    <option value="hố chậu T">hố chậu T</option>
                                    <option value="hạ sườn P">hạ sườn P</option>
                                    <option value="hạ vị">hạ vị</option>
                                    <option value="toàn bụng">toàn bụng</option>
                                </select>
                            </div>
                        </div>

                        <!-- Dengue -->
                        <div id="grp_dengue" class="disease-group flex-wrap gap-3">
                            <div class="flex items-center space-x-1 bg-white px-2 py-1.5 border rounded shadow-sm">
                                <input type="checkbox" id="chk_dauDau" class="w-4 h-4 update-trigger">
                                <label for="chk_dauDau" class="cursor-pointer">Đau mỏi cơ/nhức đầu</label>
                            </div>
                            <div class="flex items-center space-x-1 bg-white px-2 py-1.5 border rounded shadow-sm">
                                <input type="checkbox" id="chk_chayMau" class="w-4 h-4 update-trigger">
                                <label for="chk_chayMau" class="cursor-pointer">Dấu xuất huyết</label>
                            </div>
                        </div>

                        <!-- Hô hấp -->
                        <div id="grp_respiratory" class="disease-group flex-wrap gap-3">
                            <div class="flex items-center space-x-1 bg-white px-2 py-1.5 border rounded shadow-sm">
                                <input type="checkbox" id="chk_ho" class="w-4 h-4 update-trigger">
                                <label for="chk_ho" class="cursor-pointer">Ho</label>
                                <select id="state_ho" class="outline-none border-b update-trigger text-xs text-blue-600 font-semibold">
                                    <option value="đàm">có đàm</option>
                                    <option value="khan">khan</option>
                                </select>
                            </div>
                            <div class="flex items-center space-x-1 bg-white px-2 py-1.5 border rounded shadow-sm">
                                <input type="checkbox" id="chk_khotho" class="w-4 h-4 update-trigger">
                                <label for="chk_khotho" class="cursor-pointer">Khó thở</label>
                            </div>
                        </div>

                        <div class="flex flex-1 items-center space-x-2 bg-white px-2 py-1.5 border rounded shadow-sm min-w-[200px]">
                            <label class="font-medium text-slate-500 whitespace-nowrap">Khác:</label>
                            <input type="text" id="txt_khac" placeholder="Ghi thêm..." class="flex-1 border-b border-slate-300 outline-none update-trigger px-1 text-sm text-blue-700" tabindex="7">
                        </div>
                    </div>
                </div>

                <!-- [O] THỰC THỂ & [L] CẬN LÂM SÀNG -->
                <div class="bg-blue-50 p-3 rounded border border-blue-200">
                    <div class="flex justify-between items-end mb-2">
                        <h3 class="font-bold text-blue-800 text-sm">(O) Khám thực thể & Sinh hiệu</h3>
                        <button id="btnNormal" class="text-xs bg-white border border-blue-300 text-blue-700 px-2 py-1 rounded hover:bg-blue-100 transition shadow-sm font-semibold">
                            + Điền Nhanh Mô Tả Ổn Định
                        </button>
                    </div>
                    
                    <!-- Sinh hiệu -->
                    <div class="flex flex-wrap gap-2 mb-3">
                        <input type="text" id="pulse" placeholder="Mạch" class="w-16 border rounded px-2 py-1 text-sm text-center outline-none focus:ring-1 focus:ring-blue-400 update-trigger font-semibold text-red-600" tabindex="8">
                        <input type="text" id="bp" placeholder="HA" class="w-20 border rounded px-2 py-1 text-sm text-center outline-none focus:ring-1 focus:ring-blue-400 update-trigger font-semibold text-blue-600" tabindex="9">
                        <input type="text" id="resp" placeholder="NT" class="w-14 border rounded px-2 py-1 text-sm text-center outline-none focus:ring-1 focus:ring-blue-400 update-trigger font-semibold text-green-600" tabindex="10">
                        <input type="text" id="temp" placeholder="NĐ" class="w-14 border rounded px-2 py-1 text-sm text-center outline-none focus:ring-1 focus:ring-blue-400 update-trigger font-semibold text-orange-500" tabindex="11">
                        <input type="text" id="spo2" placeholder="SpO2%" class="w-16 border rounded px-2 py-1 text-sm text-center outline-none focus:ring-1 focus:ring-blue-400 update-trigger font-semibold text-purple-600" tabindex="12">
                    </div>

                    <!-- CLS Nổi Bật -->
                    <div class="bg-white p-2 rounded border border-blue-100 mb-3 shadow-sm">
                        <span class="text-xs font-bold text-slate-500 block mb-1 uppercase tracking-wider">Chỉ số xét nghiệm cần lưu ý</span>
                        
                        <div id="lab_digestive" class="lab-group active flex gap-3 text-sm">
                            <input type="text" id="lab_wbc" placeholder="WBC (K/uL)" class="border-b outline-none update-trigger w-24" tabindex="13">
                            <input type="text" id="lab_crp" placeholder="CRP (mg/L)" class="border-b outline-none update-trigger w-24" tabindex="14">
                        </div>
                        
                        <div id="lab_dengue" class="lab-group flex gap-3 text-sm">
                            <input type="text" id="lab_hct" placeholder="Hct (%)" class="border-b outline-none update-trigger w-20 text-red-600 font-semibold" tabindex="13">
                            <input type="text" id="lab_plt" placeholder="PLT (K/uL)" class="border-b outline-none update-trigger w-24 text-red-600 font-semibold" tabindex="14">
                            <input type="text" id="lab_ast" placeholder="AST/ALT" class="border-b outline-none update-trigger w-24" tabindex="15">
                        </div>

                        <div id="lab_respiratory" class="lab-group flex gap-3 text-sm">
                            <input type="text" id="lab_xray" placeholder="X-Quang Phổi" class="border-b outline-none update-trigger flex-1" tabindex="13">
                        </div>
                    </div>

                    <!-- Khám lâm sàng -->
                    <textarea id="physicalExam" rows="3" class="w-full border rounded p-2 text-sm update-trigger outline-none focus:ring-1 focus:ring-blue-400" placeholder="Mô tả thực thể..." tabindex="16">Bệnh nhân tỉnh, tiếp xúc được
Da niêm hồng, chi ấm, mạch rõ
Tim T1, T2 đều rõ
Phổi trong, âm phế bào rõ
Bụng mềm, không điểm đau khu trú
Gan lách không sờ chạm</textarea>
                </div>

                <!-- [A] & [P] -->
                <div class="flex flex-col sm:flex-row gap-4">
                    <div class="flex-1 bg-rose-50 p-3 rounded border border-rose-200">
                        <h3 class="font-bold text-rose-800 mb-2 text-sm">(A) Đánh giá / Chẩn đoán</h3>
                        <textarea id="assessment" rows="4" class="w-full border rounded p-2 text-sm update-trigger outline-none focus:ring-1 focus:ring-rose-400 font-medium" tabindex="17"></textarea>
                    </div>
                    <div class="flex-1 bg-emerald-50 p-3 rounded border border-emerald-200">
                        <h3 class="font-bold text-emerald-800 mb-2 text-sm">(P) Kế hoạch điều trị</h3>
                        <textarea id="plan" rows="4" class="w-full border rounded p-2 text-sm update-trigger outline-none focus:ring-1 focus:ring-emerald-400 font-medium" tabindex="18"></textarea>
                    </div>
                </div>

            </div>

            <!-- CỘT PHẢI: KẾT QUẢ OUTPUT -->
            <div class="lg:col-span-2 flex flex-col h-full bg-slate-800 rounded-xl p-4 shadow-xl relative">
                <div class="flex justify-between items-center mb-3">
                    <label class="block text-sm font-bold text-white uppercase tracking-wider">Preview Bệnh Án</label>
                    <button id="btnCopy" class="bg-blue-500 hover:bg-blue-400 text-white px-4 py-2 rounded shadow-lg transition flex items-center font-bold text-sm transform hover:scale-105">
                        <svg class="w-4 h-4 mr-1.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 5H6a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2v-1M8 5a2 2 0 012-2h2a2 2 0 012 2m0 0h2a2 2 0 012 2v3m2 4H10m0 0l3-3m-3 3l3 3"></path></svg>
                        Copy To HIS
                    </button>
                </div>
                <textarea id="finalOutput" class="flex-1 w-full border-none rounded-lg p-3 font-mono text-[13px] leading-relaxed focus:outline-none resize-none bg-slate-50 text-slate-800 whitespace-pre-wrap shadow-inner" readonly></textarea>
                
                <div id="toastAlert" class="absolute bottom-5 left-1/2 transform -translate-x-1/2 text-white px-4 py-2 rounded shadow-lg font-bold text-sm opacity-0 transition-opacity pointer-events-none z-50 text-center">
                    <!-- Text sẽ được update bằng JS -->
                </div>
            </div>
        </div>
    </div>

    <!-- JAVASCRIPT -->
    <script>
        const inputs = document.querySelectorAll('.update-trigger');
        const finalOutput = document.getElementById('finalOutput');
        const diseaseSelect = document.getElementById('diseaseType');
        const assessmentArea = document.getElementById('assessment');
        const planArea = document.getElementById('plan');
        const physicalExamArea = document.getElementById('physicalExam');

        // Logic Đồng bộ (S) và (O) cho Đau bụng
        function syncAbdomenExam() {
            let text = physicalExamArea.value;
            const isDau = document.getElementById('chk_daubung').checked;
            const loc = document.getElementById('loc_daubung').value;

            // Pattern tìm cụm từ đau bụng cũ trong Textarea
            const normalPattern = /không điểm đau khu trú/g;
            const painPattern = /ấn đau (thượng vị|quanh rốn|hố chậu P|hố chậu T|hạ sườn P|hạ vị|toàn bụng)/g;

            if (isDau) {
                if (normalPattern.test(text)) {
                    text = text.replace(normalPattern, `ấn đau ${loc}`);
                } else if (painPattern.test(text)) {
                    text = text.replace(painPattern, `ấn đau ${loc}`);
                }
            } else {
                if (painPattern.test(text)) {
                    text = text.replace(painPattern, "không điểm đau khu trú");
                }
            }
            physicalExamArea.value = text;
        }

        // Lắng nghe sự kiện tick chọn Đau bụng và đổi vị trí
        document.getElementById('chk_daubung').addEventListener('change', () => {
            syncAbdomenExam();
            generateSOAP();
        });
        document.getElementById('loc_daubung').addEventListener('change', () => {
            syncAbdomenExam();
            generateSOAP();
        });

        const templates = {
            digestive: {
                A: "- Nhiễm trùng tiêu hóa mức độ [Nhẹ/Vừa]\n- Bệnh hiện tại sinh hiệu ổn, giảm tiêu chảy.",
                P: "- Bù nước, điện giải (Oresol).\n- Kháng sinh đường ruột (Ciprofloxacin / Ceftriaxone).\n- Men vi sinh."
            },
            dengue: {
                A: "- Theo dõi SXH Dengue N[...]\n- Dấu hiệu cảnh báo: Không / Có (...).\n- Hiện tại sinh hiệu ổn, không chảy máu lâm sàng.",
                P: "- Bù dịch tĩnh mạch (Nếu có chỉ định).\n- Thuốc hạ sốt Paracetamol.\n- Kiểm tra lại CTM, CRP."
            },
            respiratory: {
                A: "- Theo dõi Viêm phổi / Nhiễm trùng hô hấp trên.\n- Bệnh nhân bớt ho, hết khó thở.",
                P: "- Kháng sinh (Levofloxacin / Cephalosporin thế hệ 3).\n- Thuốc giảm ho, long đàm.\n- Dinh dưỡng nâng đỡ tổng trạng."
            }
        };

        diseaseSelect.addEventListener('change', (e) => {
            const val = e.target.value;
            document.querySelectorAll('.disease-group').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.lab-group').forEach(el => el.classList.remove('active'));
            document.getElementById(`grp_${val}`).classList.add('active');
            document.getElementById(`lab_${val}`).classList.add('active');
            
            assessmentArea.value = templates[val].A;
            planArea.value = templates[val].P;
            
            generateSOAP();
        });

        function generateSOAP() {
            let output = "";

            // --- (S) ---
            output += `(S)\n`;
            let hasSymptoms = false;

            if(document.getElementById('chk_sot').checked) {
                let day = document.getElementById('day_sot').value;
                output += (day ? `Sốt ngày ${day}\n` : "Sốt\n");
                hasSymptoms = true;
            } else {
                output += "Không sốt\n";
                hasSymptoms = true;
            }

            const disease = diseaseSelect.value;
            if(disease === 'digestive') {
                let tl = document.getElementById('chk_tieulong').checked;
                let db = document.getElementById('chk_daubung').checked;
                let c_tl = document.getElementById('count_tieulong').value;
                let arr = [];
                if(db) arr.push(`Đau bụng vùng ${document.getElementById('loc_daubung').value}`);
                if(tl) arr.push(c_tl ? `tiêu lỏng ${c_tl} lần` : "tiêu lỏng");
                if(arr.length > 0) { output += arr.join(', ') + "\n"; hasSymptoms = true; }
            } else if(disease === 'dengue') {
                if(document.getElementById('chk_dauDau').checked) { output += "Nhức mỏi cơ, đau đầu\n"; hasSymptoms = true; }
                if(document.getElementById('chk_chayMau').checked) { output += "Dấu xuất huyết (+)\n"; hasSymptoms = true; }
            } else if(disease === 'respiratory') {
                if(document.getElementById('chk_ho').checked) { 
                    output += `Ho ${document.getElementById('state_ho').value}\n`; hasSymptoms = true; 
                }
                if(document.getElementById('chk_khotho').checked) { output += "Khó thở\n"; hasSymptoms = true; }
            }

            const txtKhac = document.getElementById('txt_khac').value.trim();
            if(txtKhac) {
                txtKhac.split(',').forEach(k => { output += `${k.trim()}\n`; });
                hasSymptoms = true;
            }
            if(!hasSymptoms) output += "Không ghi nhận bất thường\n";

            // --- (O) & LABS ---
            output += `(O)\n`;
            let examLines = physicalExamArea.value.split('\n');
            if(examLines.length > 0 && examLines[0].trim()) output += examLines[0] + "\n";
            if(examLines.length > 1 && examLines[1].trim()) output += examLines[1] + "\n";

            const p = document.getElementById('pulse').value;
            const bp = document.getElementById('bp').value;
            const r = document.getElementById('resp').value;
            const t = document.getElementById('temp').value;
            const spo2 = document.getElementById('spo2').value;

            if(p || bp) output += `M: ${p || '--'} l/p; HA: ${bp || '--'} mmHg\n`;
            if(r || t) output += `NT: ${r || '--'} l/p; T: ${t || '--'} độ C\n`;
            if(spo2) output += `SpO2: ${spo2}%\n`;

            let labString = "";
            if(disease === 'digestive') {
                let w = document.getElementById('lab_wbc').value;
                let c = document.getElementById('lab_crp').value;
                if(w || c) labString = `- CLS: WBC ${w || '--'}; CRP ${c || '--'}`;
            } else if(disease === 'dengue') {
                let h = document.getElementById('lab_hct').value;
                let pl = document.getElementById('lab_plt').value;
                let ast = document.getElementById('lab_ast').value;
                if(h || pl || ast) labString = `- CLS: Hct ${h || '--'}%; PLT ${pl || '--'}; AST/ALT ${ast || '--'}`;
            } else if(disease === 'respiratory') {
                let xr = document.getElementById('lab_xray').value;
                if(xr) labString = `- X-Quang: ${xr}`;
            }

            if(examLines.length > 2) {
                for(let i=2; i<examLines.length; i++) {
                    if(examLines[i].trim()) output += examLines[i] + "\n";
                }
            }
            if(labString) output += labString + "\n";

            // --- (A) & (P) ---
            output += `(A)\n${assessmentArea.value}\n(P)\n${planArea.value}`;

            finalOutput.value = output;
        }

        inputs.forEach(input => {
            if(input.id !== 'chk_daubung' && input.id !== 'loc_daubung') {
                input.addEventListener('input', generateSOAP);
                input.addEventListener('change', generateSOAP);
            }
        });

        // HÀM HIỂN THỊ THÔNG BÁO (TOAST)
        function showToast(msg, type = "success") {
            const toast = document.getElementById('toastAlert');
            toast.innerHTML = msg;
            
            if(type === "warning") {
                toast.classList.remove('bg-green-500');
                toast.classList.add('bg-orange-600');
            } else {
                toast.classList.remove('bg-orange-600');
                toast.classList.add('bg-green-500');
            }

            toast.style.opacity = '1';
            setTimeout(() => { toast.style.opacity = '0'; }, 3000);
        }

        // AUTO ĐIỀN NHANH TOÀN BỘ FORM
        document.getElementById('btnNormal').addEventListener('click', () => {
            
            document.getElementById('chk_sot').checked = false;
            document.getElementById('chk_tieulong').checked = false;
            document.getElementById('chk_daubung').checked = false;
            document.getElementById('chk_dauDau').checked = false;
            document.getElementById('chk_chayMau').checked = false;
            document.getElementById('chk_ho').checked = false;
            document.getElementById('chk_khotho').checked = false;
            document.getElementById('txt_khac').value = "Ăn uống được, tiêu tiểu bình thường";

            // Đảm bảo reset lại Textarea trước khi apply text ổn định
            physicalExamArea.value = "Bệnh nhân tỉnh, tiếp xúc được\nDa niêm hồng, chi ấm, mạch rõ\nTim T1, T2 đều rõ\nPhổi trong, âm phế bào rõ\nBụng mềm, không điểm đau khu trú\nGan lách không sờ chạm";
            
            document.getElementById('pulse').value = "80";
            document.getElementById('bp').value = "120/80";
            document.getElementById('resp').value = "20";
            document.getElementById('temp').value = "37";
            document.getElementById('spo2').value = "98";

            const disease = diseaseSelect.value;
            if(disease === 'digestive') {
                document.getElementById('lab_wbc').value = "7.5";
                document.getElementById('lab_crp').value = "< 5";
            } else if(disease === 'dengue') {
                document.getElementById('lab_hct').value = "40";
                document.getElementById('lab_plt').value = "250";
                document.getElementById('lab_ast').value = "Bình thường";
            } else if(disease === 'respiratory') {
                document.getElementById('lab_xray').value = "Không tổn thương nhu mô";
            }

            generateSOAP();
            showToast("⚠️ Đã điền form Ổn định.<br/><b>VUI LÒNG KIỂM TRA LẠI SINH HIỆU VÀ CLS THỰC TẾ!</b>", "warning");
        });

        document.getElementById('btnCopy').addEventListener('click', () => {
            finalOutput.select();
            document.execCommand('copy');
            showToast("📋 Đã copy vào bộ nhớ đệm!", "success");
        });

        document.getElementById('btnSave').addEventListener('click', () => {
            const bed = document.getElementById('bedNumber').value.trim().toUpperCase();
            if(!bed) return alert("Vui lòng nhập Số giường hoặc Mã BN để lưu!");

            const patientData = {
                disease: diseaseSelect.value,
                sot: document.getElementById('chk_sot').checked,
                day_sot: document.getElementById('day_sot').value,
                exam: physicalExamArea.value,
                assessment: assessmentArea.value,
                plan: planArea.value,
            };

            localStorage.setItem('SOAP_' + bed, JSON.stringify(patientData));
            showToast(`💾 Đã lưu hồ sơ ${bed}`, "success");
        });

        document.getElementById('btnLoad').addEventListener('click', () => {
            const bed = document.getElementById('bedNumber').value.trim().toUpperCase();
            if(!bed) return alert("Nhập Số giường để tải lại!");

            const saved = localStorage.getItem('SOAP_' + bed);
            if(saved) {
                const data = JSON.parse(saved);
                
                diseaseSelect.value = data.disease;
                diseaseSelect.dispatchEvent(new Event('change'));

                document.getElementById('chk_sot').checked = data.sot;
                document.getElementById('day_sot').value = data.day_sot ? parseInt(data.day_sot) + 1 : "";
                
                physicalExamArea.value = data.exam;
                assessmentArea.value = data.assessment;
                planArea.value = data.plan;
                
                document.getElementById('pulse').value = "";
                document.getElementById('bp').value = "";
                document.getElementById('resp').value = "";
                document.getElementById('temp').value = "";
                document.getElementById('spo2').value = "";

                // Giữ đồng bộ checkbox đau bụng dựa vào nội dung cũ
                if(data.exam.includes("ấn đau")) {
                    document.getElementById('chk_daubung').checked = true;
                }

                generateSOAP();
                showToast(`📂 Đã tải hồ sơ ${bed} (Ngày +1)`, "success");
            } else {
                alert(`Không tìm thấy dữ liệu cũ của ${bed}`);
            }
        });

        diseaseSelect.dispatchEvent(new Event('change'));
    </script>
</body>
</html>
