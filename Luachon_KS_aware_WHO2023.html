<!DOCTYPE html>
<html lang="vi" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#1e40af">
    <title>Trợ Lý Kháng Sinh AWaRe V2.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        dark: { bg: '#0f172a', card: '#1e293b', text: '#f8fafc', border: '#334155' }
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; background-color: #f8fafc; transition: background-color 0.3s; }
        .dark body { background-color: #0f172a; color: #f8fafc; }
        
        input[type="number"]::-webkit-inner-spin-button, input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
        select, input { outline: none; transition: all 0.2s; }
        
        /* Sticky Header & Bottom Nav */
        .sticky-header { position: sticky; top: 0; z-index: 50; }
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; z-index: 50; padding-bottom: env(safe-area-inset-bottom); }
        
        /* Animation chuyển Tab mượt mà giống Sepsis */
        .tab-content { display: none; animation: fadeIn 0.3s ease-in-out; }
        .tab-content.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        /* Custom scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .dark ::-webkit-scrollbar-thumb { background: #475569; }

        /* Toast Notification */
        #toast { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.8); color: white; padding: 8px 16px; border-radius: 20px; font-size: 14px; opacity: 0; pointer-events: none; transition: opacity 0.3s; z-index: 100; }
        #toast.show { opacity: 1; }
    </style>
</head>
<body class="text-gray-800 pb-24 dark:text-gray-200">

    <div class="bg-blue-800 dark:bg-slate-900 text-white p-4 shadow-md sticky-header flex justify-between items-center transition-colors">
        <div>
            <h1 class="text-xl font-bold leading-tight">AWaRe GUIDE</h1>
            <p class="text-xs text-blue-200 dark:text-slate-400">Phác đồ Kháng sinh WHO 2023</p>
        </div>
        <button onclick="toggleDarkMode()" class="p-2 bg-blue-700 dark:bg-slate-800 rounded-full hover:bg-blue-600 dark:hover:bg-slate-700 transition">
            <svg id="icon-sun" class="w-5 h-5 hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"></path></svg>
            <svg id="icon-moon" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path></svg>
        </button>
    </div>

    <div class="max-w-3xl mx-auto p-4 md:p-6">

        <div id="tab1" class="tab-content active">
            <div class="bg-white dark:bg-dark-card p-5 rounded-2xl shadow-sm border border-gray-100 dark:border-dark-border mb-6 transition-colors">
                
                <div class="mb-4">
                    <label class="block text-sm font-bold text-gray-700 dark:text-gray-300 mb-2">1. Tìm / Chọn bệnh lý:</label>
                    <div class="relative mb-2">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <svg class="h-5 w-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                        </div>
                        <input type="text" id="diseaseSearch" placeholder="Gõ để lọc bệnh (VD: phổi, não...)" class="w-full pl-10 border border-gray-300 dark:border-dark-border rounded-xl p-3 bg-gray-50 dark:bg-slate-800 text-gray-900 dark:text-white focus:ring-2 focus:ring-blue-500 font-medium transition-colors" oninput="filterDiseases()">
                    </div>
                    <select id="diseaseSelect" class="w-full border border-gray-300 dark:border-dark-border rounded-xl p-3 bg-white dark:bg-slate-800 text-gray-900 dark:text-white focus:ring-2 focus:ring-blue-500 font-medium shadow-sm transition-colors">
                        </select>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                    <div>
                        <label class="block text-sm font-bold text-gray-700 dark:text-gray-300 mb-2">2. Đối tượng:</label>
                        <select id="patientType" class="w-full border border-gray-300 dark:border-dark-border rounded-xl p-3 bg-white dark:bg-slate-800 text-gray-900 dark:text-white focus:ring-2 focus:ring-blue-500 font-medium shadow-sm transition-colors" onchange="toggleWeight()">
                            <option value="adult">Người lớn</option>
                            <option value="child">Trẻ em</option>
                        </select>
                    </div>
                    <div id="weightContainer" class="hidden">
                        <label class="block text-sm font-bold text-blue-700 dark:text-blue-400 mb-2">⚖️ Cân nặng (kg) để tính liều:</label>
                        <input type="number" id="weightInput" placeholder="Nhập số kg..." class="w-full border border-blue-300 dark:border-blue-700 rounded-xl p-3 bg-blue-50 dark:bg-slate-800 text-gray-900 dark:text-white focus:ring-2 focus:ring-blue-500 font-bold shadow-sm transition-colors">
                    </div>
                </div>

                <button onclick="calculateDisease()" class="w-full bg-blue-600 hover:bg-blue-700 active:bg-blue-800 text-white font-bold py-3.5 px-4 rounded-xl shadow-[0_4px_14px_0_rgba(37,99,235,0.39)] transition-all flex justify-center items-center mt-2 uppercase tracking-wide">
                    <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                    Tra Cứu Phác Đồ
                </button>
            </div>
            
            <div id="result-disease" class="mt-4 hidden animate-fade-in pb-4"></div>
        </div>

        <div id="tab2" class="tab-content">
            <div class="bg-white dark:bg-dark-card p-5 rounded-2xl shadow-sm border border-gray-100 dark:border-dark-border mb-6 transition-colors">
                <label class="block text-sm font-bold text-gray-700 dark:text-gray-300 mb-2">Tìm nhanh phân tầng AWaRe:</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <svg class="h-5 w-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                    </div>
                    <input type="text" id="drugInput" placeholder="Gõ tên thuốc (VD: Meropenem)..." class="w-full pl-10 border border-gray-300 dark:border-dark-border rounded-xl p-3 bg-gray-50 dark:bg-slate-800 text-gray-900 dark:text-white focus:ring-2 focus:ring-blue-500 font-medium transition-colors" oninput="searchDrug()">
                </div>
            </div>
            <div id="result-drug" class="mt-4 pb-4"></div>
        </div>

        <div id="tab3" class="tab-content">
            <div class="bg-white dark:bg-dark-card p-5 rounded-2xl shadow-sm border border-gray-100 dark:border-dark-border mb-4 transition-colors">
                <h3 class="font-bold text-lg text-gray-800 dark:text-white mb-3 flex items-center">
                    <svg class="w-5 h-5 mr-2 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 7h6m0 10v-3m-3 3h.01M9 17h.01M9 14h.01M12 14h.01M15 11h.01M12 11h.01M9 11h.01M7 21h10a2 2 0 002-2V5a2 2 0 00-2-2H7a2 2 0 00-2 2v14a2 2 0 002 2z"></path></svg>
                    Tính MLCT (eGFR) chỉnh liều
                </h3>
                <p class="text-sm text-gray-600 dark:text-gray-400 mb-4">Ước tính mức lọc cầu thận theo Cockcroft-Gault để chỉnh liều kháng sinh.</p>
                
                <div class="grid grid-cols-2 gap-3 mb-3">
                    <div>
                        <label class="block text-xs font-semibold text-gray-500 mb-1">Tuổi</label>
                        <input type="number" id="cgAge" class="w-full border border-gray-300 dark:border-dark-border rounded-lg p-2 bg-gray-50 dark:bg-slate-800 text-gray-900 dark:text-white">
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-gray-500 mb-1">Cân nặng (kg)</label>
                        <input type="number" id="cgWeight" class="w-full border border-gray-300 dark:border-dark-border rounded-lg p-2 bg-gray-50 dark:bg-slate-800 text-gray-900 dark:text-white">
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-3 mb-4">
                    <div>
                        <label class="block text-xs font-semibold text-gray-500 mb-1">Creatinin máu</label>
                        <input type="number" id="cgCre" placeholder="µmol/L" class="w-full border border-gray-300 dark:border-dark-border rounded-lg p-2 bg-gray-50 dark:bg-slate-800 text-gray-900 dark:text-white">
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-gray-500 mb-1">Giới tính</label>
                        <select id="cgSex" class="w-full border border-gray-300 dark:border-dark-border rounded-lg p-2 bg-white dark:bg-slate-800 text-gray-900 dark:text-white">
                            <option value="male">Nam</option>
                            <option value="female">Nữ</option>
                        </select>
                    </div>
                </div>
                <button onclick="calculateEGFR()" class="w-full bg-slate-800 dark:bg-blue-600 text-white font-bold py-2 rounded-lg">Tính eGFR</button>
                <div id="egfrResult" class="mt-4 text-center font-bold text-xl text-blue-700 dark:text-blue-400 hidden"></div>
            </div>
        </div>
        <div id="tab4" class="tab-content">
            <div class="bg-white dark:bg-dark-card p-5 rounded-2xl shadow-sm border border-gray-100 dark:border-dark-border mb-6 transition-colors">
                <h3 class="font-bold text-lg text-red-700 dark:text-red-400 mb-3 flex items-center">
                    <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19.428 15.428a2 2 0 00-1.022-.547l-2.387-.477a6 6 0 00-3.86.517l-.318.158a6 6 0 01-3.86.517L6.05 15.21a2 2 0 00-1.806.547M8 4h8l-1 1v5.172a2 2 0 00.586 1.414l5 5c1.26 1.26.367 3.414-1.415 3.414H4.828c-1.782 0-2.674-2.154-1.414-3.414l5-5A2 2 0 009 10.172V5L8 4z"></path></svg>
                    Phác đồ theo đích Vi khuẩn
                </h3>
                <p class="text-sm text-gray-600 dark:text-gray-400 mb-4">Sử dụng khi đã có kết quả nuôi cấy vi sinh hoặc nghi ngờ cao nhiễm vi khuẩn đa kháng.</p>
                
                <div class="mb-4">
                    <label class="block text-sm font-bold text-gray-700 dark:text-gray-300 mb-2">Chọn tác nhân Vi sinh:</label>
                    <select id="pathogenSelect" class="w-full border border-red-300 dark:border-red-800 rounded-xl p-3 bg-red-50 dark:bg-slate-800 text-gray-900 dark:text-white focus:ring-2 focus:ring-red-500 font-medium transition-colors">
                        <option value="mrsa">Tụ cầu vàng kháng Methicillin (MRSA)</option>
                        <option value="esbl">E. coli / Klebsiella sinh ESBL</option>
                        <option value="pseudomonas">Trực khuẩn mủ xanh (P. aeruginosa)</option>
                    </select>
                </div>
                
                <button onclick="calculatePathogen()" class="w-full bg-red-600 hover:bg-red-700 text-white font-bold py-3.5 px-4 rounded-xl shadow-[0_4px_14px_0_rgba(220,38,38,0.39)] transition-all uppercase tracking-wide">
                    Xem Kháng sinh Nhạy cảm
                </button>
            </div>
            
            <div id="result-pathogen" class="mt-4 hidden animate-fade-in pb-4"></div>
        </div>

    </div>

    <div class="bottom-nav bg-white dark:bg-slate-900 border-t border-gray-200 dark:border-dark-border flex justify-around items-center h-16 shadow-[0_-2px_10px_rgba(0,0,0,0.05)] transition-colors">
        <button onclick="switchTab(1)" class="nav-btn w-full h-full flex flex-col items-center justify-center text-blue-600 dark:text-blue-400 transition-colors">
            <svg class="w-6 h-6 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19.428 15.428a2 2 0 00-1.022-.547l-2.387-.477a6 6 0 00-3.86.517l-.318.158a6 6 0 01-3.86.517L6.05 15.21a2 2 0 00-1.806.547M8 4h8l-1 1v5.172a2 2 0 00.586 1.414l5 5c1.26 1.26.367 3.414-1.415 3.414H4.828c-1.782 0-2.674-2.154-1.414-3.414l5-5A2 2 0 009 10.172V5L8 4z"></path></svg>
            <span class="text-[10px] font-bold uppercase tracking-wide">Bệnh Lý</span>
        </button>
        <button onclick="switchTab(2)" class="nav-btn w-full h-full flex flex-col items-center justify-center text-gray-400 dark:text-gray-500 hover:text-blue-600 dark:hover:text-blue-400 transition-colors">
            <svg class="w-6 h-6 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"></path></svg>
            <span class="text-[10px] font-bold uppercase tracking-wide">Thuốc</span>
        </button>
        <button onclick="switchTab(3)" class="nav-btn w-full h-full flex flex-col items-center justify-center text-gray-400 dark:text-gray-500 hover:text-blue-600 dark:hover:text-blue-400 transition-colors">
            <svg class="w-6 h-6 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
            <span class="text-[10px] font-bold uppercase tracking-wide">Công cụ</span>
        </button>
        <button onclick="switchTab(4)" class="nav-btn w-full h-full flex flex-col items-center justify-center text-gray-400 dark:text-gray-500 hover:text-red-600 dark:hover:text-red-400 transition-colors">
            <svg class="w-6 h-6 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 11c0 3.517-1.009 6.799-2.753 9.571m-3.44-2.04l.054-.09A13.916 13.916 0 008 11a4 4 0 118 0c0 1.017-.07 2.019-.203 3m-2.118 6.844A21.88 21.88 0 0015.171 17m3.839 1.132c.645-2.266.99-4.659.99-7.132A8 8 0 008 4.07M3 15.364c.64-1.319 1-2.8 1-4.364 0-1.457.39-2.823 1.07-4"></path></svg>
            <span class="text-[10px] font-bold uppercase tracking-wide">Vi Sinh</span>
        </button>
    </div>

    <div id="toast">Đã copy y lệnh!</div>

                        { drug: "Linezolid", dose: "600 mg Tiêm TM hoặc Uống cách 12 giờ\n(Ngấm cực tốt vào phổi và mô mềm. Không cần chỉnh liều suy thận)" }
                    ]
                },
                "esbl": {
                    name: "E. coli / Klebsiella sinh ESBL",
                    consideration: "Vi khuẩn sinh men Beta-lactamase phổ rộng (ESBL) phá hủy hầu hết Penicillin và Cephalosporin. Lựa chọn tối ưu phụ thuộc vào vị trí nhiễm khuẩn (Máu/Phổi vs. Tiết niệu).",
                    duration: "7 - 14 ngày",
                    access: [{ drug: "Nitrofurantoin", dose: "100mg uống cách 12h (CHỈ DÙNG CHO Viêm bàng quang cấp chưa biến chứng, vì thuốc chỉ bài tiết qua nước tiểu)" }], 
                    access_alt: [],
                    watch: [
                        { drug: "Fosfomycin", dose: "3g uống 1 liều duy nhất (Dành cho viêm bàng quang)" },
                        { drug: "Piperacillin + tazobactam", dose: "4.5g Tiêm TM cách 6h (Chỉ dùng cho viêm thận bể thận hoặc nhiễm khuẩn ổ bụng nhẹ/vừa)" }
                    ], 
                    reserve: [
                        { drug: "Meropenem", dose: "1 g Tiêm TM cách 8 giờ\n(Lựa chọn ĐẦU TAY VÀ AN TOÀN NHẤT cho nhiễm khuẩn huyết hoặc nhiễm khuẩn nặng do ESBL)" }
                    ]
                },
                "pseudomonas": {
                    name: "Trực khuẩn mủ xanh (Pseudomonas aeruginosa)",
                    consideration: "Vi khuẩn Gram âm có độc lực cực cao và tỷ lệ kháng thuốc lớn. Thường gây Viêm phổi bệnh viện (HAP/VAP) hoặc nhiễm khuẩn huyết.",
                    duration: "10 - 14 ngày",
                    access: [], access_alt: [],
                    watch: [
                        { drug: "Cefepime hoặc Ceftazidime", dose: "2 g Tiêm TM cách 8 giờ (Cephalosporin có tác dụng kháng trực khuẩn mủ xanh)" },
                        { drug: "Piperacillin + tazobactam", dose: "4.5 g Tiêm TM cách 6 giờ" },
                        { drug: "Ciprofloxacin", dose: "400 mg Tiêm TM cách 8-12 giờ (Thuốc uống duy nhất có tác dụng với Pseudomonas, dùng để xuống thang)" }
                    ], 
                    reserve: [
                        { drug: "Meropenem", dose: "1 - 2 g Tiêm TM cách 8 giờ" }
                    ]
                }
            }
        };

        // ======================================================================
        // 2. KHỞI TẠO GIAO DIỆN & RENDER DANH SÁCH BỆNH
        // ======================================================================
        function initApp() {
            const select = document.getElementById('diseaseSelect');
            let groups = {};
            
            // Phân nhóm bệnh lý tự động
            for (const [id, data] of Object.entries(awareDB.diseases)) {
                let cat = data.category || "Các bệnh lý khác";
                if (!groups[cat]) groups[cat] = [];
                groups[cat].push({ id, name: data.name });
            }

            // Đổ dữ liệu vào Select
            let html = "";
            for (const cat in groups) {
                html += `<optgroup label="--- ${cat.toUpperCase()} ---">`;
                groups[cat].forEach(d => {
                    html += `<option value="${d.id}">${d.name}</option>`;
                });
                html += `</optgroup>`;
            }
            select.innerHTML = html;
        }

        // ======================================================================
        // 3. LOGIC GIAO DIỆN (DARK MODE, BOTTOM NAV, SEARCH)
        // ======================================================================
        function toggleDarkMode() {
            document.documentElement.classList.toggle('dark');
            document.getElementById('icon-sun').classList.toggle('hidden');
            document.getElementById('icon-moon').classList.toggle('hidden');
        }

        function switchTab(tabIndex) {
            // Ẩn tất cả nội dung
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            // Reset màu tất cả nút nav
            document.querySelectorAll('.nav-btn').forEach(btn => {
                btn.classList.remove('text-blue-600', 'dark:text-blue-400');
                btn.classList.add('text-gray-400', 'dark:text-gray-500');
            });

            // Kích hoạt tab được chọn
            document.getElementById(`tab${tabIndex}`).classList.add('active');
            const activeBtn = document.querySelectorAll('.nav-btn')[tabIndex - 1];
            activeBtn.classList.remove('text-gray-400', 'dark:text-gray-500');
            activeBtn.classList.add('text-blue-600', 'dark:text-blue-400');
        }

        function filterDiseases() {
            const input = document.getElementById('diseaseSearch').value.toLowerCase().trim();
            const select = document.getElementById('diseaseSelect');
            const optgroups = select.getElementsByTagName('optgroup');
            let firstVisibleOption = null;

            for (let group of optgroups) {
                let hasVisibleOption = false;
                const options = group.getElementsByTagName('option');
                for (let option of options) {
                    const text = option.textContent.toLowerCase();
                    if (text.includes(input)) {
                        option.style.display = '';
                        hasVisibleOption = true;
                        if (!firstVisibleOption) firstVisibleOption = option;
                    } else {
                        option.style.display = 'none';
                    }
                }
                group.style.display = hasVisibleOption ? '' : 'none';
            }
            if (input !== '' && firstVisibleOption) select.value = firstVisibleOption.value;
        }

        function toggleWeight() {
            const type = document.getElementById('patientType').value;
            const container = document.getElementById('weightContainer');
            container.style.display = type === 'child' ? 'block' : 'none';
            if(type === 'adult') document.getElementById('weightInput').value = '';
        }

        function showToast() {
            const toast = document.getElementById('toast');
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2000);
        }

        function copyOrder(textToCopy) {
            navigator.clipboard.writeText(textToCopy).then(() => {
                showToast();
            });
        }

        // ======================================================================
        // 4. LÕI TÍNH TOÁN & HIỂN THỊ PHÁC ĐỒ (HỖ TRỢ TÍNH LIỀU TỰ ĐỘNG)
        // ======================================================================
        function calculateDisease() {
            const diseaseId = document.getElementById('diseaseSelect').value;
            const patientType = document.getElementById('patientType').value;
            const weight = parseFloat(document.getElementById('weightInput').value) || 0;
            
            const diseaseNode = awareDB.diseases[diseaseId];
            const patientData = diseaseNode[patientType];
            const title = diseaseNode.name;

            let html = `
                <div class="mb-4">
                    <h2 class="text-xl font-bold text-gray-800 dark:text-white border-b-2 border-blue-600 pb-2 inline-block">
                        ${title} (${patientType === 'adult' ? 'Người lớn' : 'Trẻ em'})
                    </h2>
                </div>
            `;

            // HÀM PHỤ: Tự động tính liều nếu có mg/kg
            function parseDose(doseStr) {
                if (weight > 0 && doseStr.includes('mg/kg')) {
                    return doseStr.replace(/(\d+(?:\.\d+)?)(?:\s*-\s*(\d+(?:\.\d+)?))?\s*mg\/kg/gi, function(match, p1, p2) {
                        let min = (parseFloat(p1) * weight).toFixed(0);
                        let max = p2 ? (parseFloat(p2) * weight).toFixed(0) : min;
                        let calcStr = p2 ? `${min} - ${max} mg` : `${min} mg`;
                        return `${match} <strong class="text-blue-700 dark:text-blue-400 bg-blue-100 dark:bg-slate-700 px-1 rounded animate-pulse">(= ${calcStr})</strong>`;
                    });
                }
                return doseStr;
            }

            // HÀM PHỤ: Vẽ từng khối phác đồ (có nút Copy)
            function renderBlock(data, blockTitle) {
                if (!data) return '';
                let blockHtml = '';
                
                if (blockTitle) {
                    blockHtml += `<div class="mb-6 border border-gray-200 dark:border-dark-border rounded-xl overflow-hidden shadow-sm">`;
                    blockHtml += `<div class="bg-gray-200 dark:bg-slate-700 text-gray-800 dark:text-white font-bold px-4 py-3 border-b border-gray-200 dark:border-dark-border uppercase flex justify-between items-center">
                                    <span>${blockTitle}</span>
                                  </div>`;
                    blockHtml += `<div class="p-4 bg-white dark:bg-dark-card">`;
                } else {
                    blockHtml += `<div class="mb-6">`;
                }

                blockHtml += `
                    <div class="bg-blue-50 dark:bg-slate-800 text-blue-900 dark:text-blue-100 p-4 rounded-xl border border-blue-100 dark:border-slate-700 mb-4 shadow-sm">
                        <div class="flex items-start">
                            <svg class="w-6 h-6 mr-2 flex-shrink-0 text-blue-600 dark:text-blue-400 mt-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                            <div>
                                <h3 class="font-bold mb-1">Cân nhắc lâm sàng & Xử trí:</h3>
                                <p class="text-sm leading-relaxed whitespace-pre-line">${data.consideration}</p>
                                <p class="text-sm font-bold mt-2 text-blue-700 dark:text-blue-400">⏳ Thời gian điều trị: ${data.duration}</p>
                            </div>
                        </div>
                    </div>
                `;

                const drawDrugCard = (drug, type, bg, border, textColor, badgeBg) => {
                    const parsedDose = parseDose(drug.dose);
                    const plainText = `${diseaseNode.name} - ${drug.drug}: ${drug.dose.replace(/\n/g, ' ')}`;
                    
                    // LỌC TÌM CẢNH BÁO TƯƠNG TÁC THUỐC
                    const drugDictExact = awareDB.drugs.find(d => drug.drug.includes(d.name)) || {};
                    let warningHtml = '';
                    if(drugDictExact.warning) {
                        warningHtml = `<div class="mt-3 bg-red-100 dark:bg-red-900/30 border border-red-300 dark:border-red-800 rounded-lg p-3 text-sm text-red-800 dark:text-red-300 flex items-start shadow-inner">
                            <span class="mr-2 text-lg">⚠️</span>
                            <span><strong>Cảnh báo an toàn:</strong> ${drugDictExact.warning}</span>
                        </div>`;
                    }
                    
                    return `
                    <div class="${bg} dark:bg-slate-800 border-l-4 ${border} p-4 mb-3 rounded-r-xl shadow-sm relative group">
                        <div class="pr-8">
                            <p class="font-bold ${textColor} dark:text-white text-lg">${drug.drug}</p>
                            <p class="text-sm ${textColor} dark:text-gray-300 whitespace-pre-line mt-1">${parsedDose}</p>
                            ${warningHtml} </div>
                        <button onclick="copyOrder('${plainText}')" class="absolute top-4 right-4 text-gray-400 hover:text-blue-600 dark:hover:text-blue-400 p-1" title="Copy y lệnh">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 5H6a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2v-1M8 5a2 2 0 002 2h2a2 2 0 002-2M8 5a2 2 0 012-2h2a2 2 0 012 2m0 0h2a2 2 0 012 2v3m2 4H10m0 0l3-3m-3 3l3 3"></path></svg>
                        </button>
                    </div>`;
                };
                if (data.access && data.access.length > 0) {
                    blockHtml += `<h4 class="font-bold text-green-700 dark:text-green-400 mt-4 mb-2 flex items-center"><span class="w-3 h-3 bg-green-500 rounded-full mr-2"></span> TIẾP CẬN (Lựa chọn đầu tay)</h4>`;
                    data.access.forEach(drug => blockHtml += drawDrugCard(drug, 'Access', 'bg-green-50', 'border-green-500', 'text-green-900', 'bg-green-500'));
                }

                if (data.access_alt && data.access_alt.length > 0) {
                    blockHtml += `<h4 class="font-bold text-green-700 dark:text-green-400 mt-5 mb-2 flex items-center"><span class="w-3 h-3 bg-green-400 rounded-full mr-2"></span> TIẾP CẬN (Thay thế)</h4>`;
                    data.access_alt.forEach(drug => blockHtml += drawDrugCard(drug, 'Access_Alt', 'bg-white', 'border-green-400 border-y border-r border-green-100', 'text-green-900', 'bg-green-400'));
                }

                if (data.watch && data.watch.length > 0) {
                    blockHtml += `<h4 class="font-bold text-yellow-700 dark:text-yellow-400 mt-5 mb-2 flex items-center"><span class="w-3 h-3 bg-yellow-500 rounded-full mr-2"></span> GIÁM SÁT (Thay thế / Bắt buộc)</h4>`;
                    data.watch.forEach(drug => blockHtml += drawDrugCard(drug, 'Watch', 'bg-yellow-50', 'border-yellow-500', 'text-yellow-900', 'bg-yellow-500'));
                }

                if (data.reserve && data.reserve.length > 0) {
                    blockHtml += `<h4 class="font-bold text-red-700 dark:text-red-400 mt-5 mb-2 flex items-center"><span class="w-3 h-3 bg-red-600 rounded-full mr-2 animate-pulse"></span> DỰ TRỮ (Cảnh báo nguy cơ)</h4>`;
                    data.reserve.forEach(drug => blockHtml += drawDrugCard(drug, 'Reserve', 'bg-red-50', 'border-red-600', 'text-red-900', 'bg-red-600'));
                }

                blockHtml += blockTitle ? `</div></div>` : `</div>`;
                return blockHtml;
            }

            // KIỂM TRA MỨC ĐỘ BỆNH VÀ RENDER
            if (patientData.mild || patientData.severe) {
                if (patientData.mild) html += renderBlock(patientData.mild, "Mức độ Nhẹ / Ngoại trú");
                if (patientData.severe) html += renderBlock(patientData.severe, "Mức độ Nặng / Nội trú (Cấp cứu)");
            } else {
                html += renderBlock(patientData, null);
            }

            const resultDiv = document.getElementById('result-disease');
            resultDiv.innerHTML = html;
            resultDiv.classList.remove('hidden');
        }

        // ======================================================================
        // 5. TỪ ĐIỂN KHÁNG SINH & CÔNG CỤ eGFR
        // ======================================================================
        function searchDrug() {
            const query = document.getElementById('drugInput').value.toLowerCase().trim();
            const resultDiv = document.getElementById('result-drug');
            if (!query) { resultDiv.innerHTML = '<p class="text-gray-500 dark:text-gray-400 text-center italic mt-4">Gõ tên thuốc để tra cứu...</p>'; return; }
            const results = awareDB.drugs.filter(d => d.name.toLowerCase().includes(query));
            if (results.length === 0) { resultDiv.innerHTML = '<p class="text-red-500 text-center font-medium mt-4">Không tìm thấy.</p>'; return; }

            let html = '';
            results.forEach(d => {
                let colorClass = d.group === 'Access' ? 'text-green-800 dark:text-green-400' : d.group === 'Watch' ? 'text-yellow-800 dark:text-yellow-400' : 'text-red-800 dark:text-red-400';
                let bgColor = d.group === 'Access' ? 'bg-green-50 dark:bg-slate-800' : d.group === 'Watch' ? 'bg-yellow-50 dark:bg-slate-800' : 'bg-red-50 dark:bg-slate-800';
                let borderColor = d.group === 'Access' ? 'border-green-500' : d.group === 'Watch' ? 'border-yellow-500' : 'border-red-600';
                let badgeColor = d.group === 'Access' ? 'bg-green-500' : d.group === 'Watch' ? 'bg-yellow-500' : 'bg-red-600';
                
                html += `<div class="${bgColor} border-l-4 ${borderColor} p-4 mb-3 rounded-r-xl shadow-sm">
                            <div class="flex justify-between items-center mb-1">
                                <h4 class="font-bold ${colorClass} text-lg">${d.name}</h4>
                                <span class="px-2 py-1 text-[10px] font-bold text-white rounded-full uppercase ${badgeColor}">${d.group}</span>
                            </div>
                            <p class="text-sm ${colorClass} opacity-90">${d.desc}</p>
                         </div>`;
            });
            resultDiv.innerHTML = html;
        }

        function calculateEGFR() {
            const age = parseFloat(document.getElementById('cgAge').value);
            const weight = parseFloat(document.getElementById('cgWeight').value);
            const cre = parseFloat(document.getElementById('cgCre').value);
            const sex = document.getElementById('cgSex').value;
            const resDiv = document.getElementById('egfrResult');

            if(!age || !weight || !cre) {
                resDiv.textContent = "Vui lòng nhập đủ thông tin!";
                resDiv.classList.remove('hidden', 'text-blue-700', 'dark:text-blue-400');
                resDiv.classList.add('text-red-500');
                return;
            }

            let egfr = ((140 - age) * weight) / (0.814 * cre);
            if (sex === 'female') egfr *= 0.85;

            resDiv.classList.remove('hidden', 'text-red-500');
            resDiv.classList.add('text-blue-700', 'dark:text-blue-400');
            resDiv.innerHTML = `eGFR: ${egfr.toFixed(1)} <span class="text-sm font-normal">mL/phút</span>`;
        }
        function calculatePathogen() {
            const pathogenId = document.getElementById('pathogenSelect').value;
            const data = awareDB.pathogens[pathogenId];

            let html = `
                <div class="mb-4">
                    <h2 class="text-xl font-bold text-red-800 dark:text-red-400 border-b-2 border-red-600 pb-2 inline-block">
                        Kháng sinh điều trị: ${data.name}
                    </h2>
                </div>
                
                <div class="bg-red-50 dark:bg-red-900/20 text-red-900 dark:text-red-200 p-4 rounded-xl border border-red-200 dark:border-red-800 mb-6 shadow-sm">
                    <h3 class="font-bold mb-1 flex items-center"><svg class="w-5 h-5 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg> Nhận xét & Lâm sàng:</h3>
                    <p class="text-sm leading-relaxed whitespace-pre-line">${data.consideration}</p>
                    <p class="text-sm font-bold mt-2 text-red-700 dark:text-red-400">⏳ Thời gian điều trị dự kiến: ${data.duration}</p>
                </div>
            `;

            const drawDrugCard = (drug, border, textColor, badgeBg) => {
                const drugDictExact = awareDB.drugs.find(d => drug.drug.includes(d.name)) || {};
                let warningHtml = '';
                if(drugDictExact.warning) {
                    warningHtml = `<div class="mt-3 bg-red-100 dark:bg-red-900/30 border border-red-300 dark:border-red-800 rounded-lg p-3 text-sm text-red-800 dark:text-red-300 flex items-start shadow-inner"><span class="mr-2 text-lg">⚠️</span><span><strong>Cảnh báo:</strong> ${drugDictExact.warning}</span></div>`;
                }
                
                return `
                <div class="bg-white dark:bg-slate-800 border-l-4 ${border} p-4 mb-3 rounded-r-xl shadow-sm">
                    <p class="font-bold ${textColor} dark:text-white text-lg">${drug.drug}</p>
                    <p class="text-sm ${textColor} dark:text-gray-300 whitespace-pre-line mt-1">${drug.dose}</p>
                    ${warningHtml}
                </div>`;
            };

            if (data.watch && data.watch.length > 0) {
                html += `<h4 class="font-bold text-yellow-700 dark:text-yellow-400 mt-5 mb-2 flex items-center"><span class="w-3 h-3 bg-yellow-500 rounded-full mr-2"></span> NHÓM GIÁM SÁT (Watch)</h4>`;
                data.watch.forEach(drug => html += drawDrugCard(drug, 'border-yellow-500', 'text-yellow-900', 'bg-yellow-500'));
            }
            if (data.reserve && data.reserve.length > 0) {
                html += `<h4 class="font-bold text-red-700 dark:text-red-400 mt-5 mb-2 flex items-center"><span class="w-3 h-3 bg-red-600 rounded-full mr-2 animate-pulse"></span> NHÓM DỰ TRỮ (Reserve)</h4>`;
                data.reserve.forEach(drug => html += drawDrugCard(drug, 'border-red-600', 'text-red-900', 'bg-red-600'));
            }

            const resultDiv = document.getElementById('result-pathogen');
            resultDiv.innerHTML = html;
            resultDiv.classList.remove('hidden');
        }
        // Khởi động
        initApp();
        searchDrug();
    </script>
    </body>
</html>
