<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ Thống Hỗ Trợ Lâm Sàng - XHTH Trên</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; color: #333; margin: 0; padding: 20px; line-height: 1.6; }
        .container { max-width: 900px; margin: 0 auto; background: #fff; padding: 25px; border-radius: 10px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        h1 { color: #2c3e50; text-align: center; border-bottom: 3px solid #3498db; padding-bottom: 10px; margin-bottom: 20px; }
        h2 { color: #2980b9; margin-top: 0; }
        .section { margin-bottom: 30px; padding: 20px; background: #fdfdfd; border-left: 5px solid #3498db; border-radius: 5px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        label { display: block; margin-top: 15px; font-weight: bold; color: #2c3e50; }
        input, select { padding: 10px; margin-top: 5px; width: 100%; box-sizing: border-box; border: 1px solid #bdc3c7; border-radius: 5px; font-size: 16px; }
        button { background-color: #3498db; color: white; border: none; cursor: pointer; font-weight: bold; margin-top: 20px; padding: 12px; width: 100%; font-size: 16px; border-radius: 5px; transition: background 0.3s; }
        button:hover { background-color: #2980b9; }
        .result-box { margin-top: 20px; padding: 15px; border-radius: 5px; display: none; font-size: 15px; }
        .info-box { background-color: #e8f8f5; border-left: 5px solid #1abc9c; }
        .warning-box { background-color: #fcf3cf; border-left: 5px solid #f1c40f; }
        .danger-box { background-color: #fadbd8; border-left: 5px solid #e74c3c; }
        .tabs { display: flex; margin-bottom: 20px; border-bottom: 2px solid #ddd; }
        .tab-btn { flex: 1; background: transparent; color: #7f8c8d; border-radius: 0; margin-top: 0; width: auto; font-size: 18px; padding: 10px; }
        .tab-btn.active { color: #3498db; border-bottom: 3px solid #3498db; font-weight: bold; }
        .tab-btn:hover { background: #f0f3f4; color: #3498db; }
        .tab-content { display: none; animation: fadeIn 0.5s; }
        .tab-content.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        ul { margin-top: 10px; padding-left: 20px; }
    </style>
</head>
<body>

<div class="container">
    <h1>Hệ Thống Hỗ Trợ Quyết Định Lâm Sàng: XHTH Trên</h1>

    <div class="section">
        <h2>Bước 1: Phân Độ Mất Máu Cấp</h2>
        <label>Mạch (lần/phút):</label>
        <input type="number" id="heartRate" placeholder="Ví dụ: 110">
        
        <label>Huyết áp tâm thu (mmHg):</label>
        <input type="number" id="systolicBP" placeholder="Ví dụ: 85">

        <button onclick="calculateSeverity()">Đánh giá mức độ & Hồi sức</button>
        <div id="severityResult" class="result-box"></div>
    </div>

    <div class="section">
        <h2>Bước 2: Xử Trí Theo Nguyên Nhân</h2>
        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('loet')">XHTH Do Loét DD-TT</button>
            <button class="tab-btn" onclick="switchTab('taltmc')">XHTH Do Vỡ TMTQ</button>
        </div>

        <div id="loet" class="tab-content active">
            <label>Lựa chọn Phân loại Forrest (Kết quả Nội soi):</label>
            <select id="forrestType">
                <option value="Ia">Ia - Máu phun thành tia</option>
                <option value="Ib">Ib - Rỉ máu quanh ổ loét</option>
                <option value="IIa">IIa - Có mạch máu nhưng không chảy máu</option>
                <option value="IIb">IIb - Có cục máu đông</option>
                <option value="IIc">IIc - Có cặn đen</option>
                <option value="III">III - Đáy sạch phủ fibrin</option>
            </select>
            <button onclick="treatUlcer()">Đưa ra Phác Đồ Loét</button>
            <div id="ulcerResult" class="result-box"></div>
        </div>

        <div id="taltmc" class="tab-content">
            <label>Đánh giá tình trạng lâm sàng:</label>
            <select id="variceState">
                <option value="active">Đang xuất huyết / Mới nhập viện</option>
                <option value="massive">Xuất huyết ồ ạt / Huyết động không ổn định / Kháng trị</option>
            </select>
            <button onclick="treatVarice()">Đưa ra Phác Đồ TALTMC</button>
            <div id="variceResult" class="result-box"></div>
        </div>
    </div>
</div>

<script>
    function calculateSeverity() {
        const hr = parseInt(document.getElementById('heartRate').value);
        const sbp = parseInt(document.getElementById('systolicBP').value);
        const resultBox = document.getElementById('severityResult');
        
        if(isNaN(hr) || isNaN(sbp)) {
            alert("Vui lòng nhập đầy đủ các chỉ số sinh hiệu!");
            return;
        }

        resultBox.style.display = 'block';
        resultBox.className = 'result-box';

        let abcResuscitation = `
            <br><br><b>Hướng dẫn Hồi sức ABC:</b>
            <ul>
                <li>Lập ngay 2 đường truyền tĩnh mạch lớn.</li>
                <li>Truyền dung dịch đẳng trương (Lactate Ringer, NaCl 0.9%). Bỏ qua Glucose ưu trương.</li>
                <li>Không nâng HA max > 140mmHg. Giữ Hct mục tiêu ≥ 20% (hoặc 25% ở cơ địa đặc biệt).</li>
            </ul>
        `;

        if (hr >= 120 || sbp < 80) {
            resultBox.classList.add('danger-box');
            resultBox.innerHTML = `<strong>MỨC ĐỘ NẶNG (ĐỘ III)</strong><br>Ước tính mất ≥ 30% thể tích máu (≥ 1500ml). Bệnh nhân có nguy cơ sốc.` + abcResuscitation + `<ul><li><b>Khẩn cấp:</b> Xin máu dự trù và nội soi can thiệp ngay khi huyết động cho phép.</li></ul>`;
        } else if (hr >= 100 || (sbp >= 80 && sbp < 90)) {
            resultBox.classList.add('warning-box');
            resultBox.innerHTML = `<strong>MỨC ĐỘ TRUNG BÌNH (ĐỘ II)</strong><br>Ước tính mất 20-30% thể tích máu.` + abcResuscitation;
        } else {
            resultBox.classList.add('info-box');
            resultBox.innerHTML = `<strong>MỨC ĐỘ NHẸ (ĐỘ I)</strong><br>Ước tính mất ≤ 10% thể tích máu (≤ 500ml).<br><br><b>Hướng dẫn:</b> Tiếp tục theo dõi sinh hiệu, lên lịch nội soi trong vòng 12-24 giờ.`;
        }
    }

    function switchTab(tabId) {
        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
        event.target.classList.add('active');
        document.getElementById(tabId).classList.add('active');
    }

    function treatUlcer() {
        const type = document.getElementById('forrestType').value;
        const resultBox = document.getElementById('ulcerResult');
        resultBox.style.display = 'block';
        resultBox.className = 'result-box';

        let riskPercent = "";
        let treatment = "";

        switch(type) {
            case "Ia": riskPercent = "55%"; break;
            case "Ib": riskPercent = "55%"; break;
            case "IIa": riskPercent = "43%"; break;
            case "IIb": riskPercent = "22%"; break;
            case "IIc": riskPercent = "10%"; break;
            case "III": riskPercent = "5%"; break;
        }

        if(["Ia", "Ib", "IIa", "IIb"].includes(type)) {
            resultBox.classList.add('danger-box');
            
            let extraAction = type === "IIb" ? "<li><b>Lưu ý (IIb):</b> Cần rửa trôi cục máu đông để đánh giá lại tổn thương bên dưới.</li>" : "";

            treatment = `
                <strong>NHÓM NGUY CƠ CAO</strong><br>
                Tỷ lệ tái xuất huyết: <b>${riskPercent}</b><br><br>
                <b>Phác đồ:</b>
                <ul>
                    <li><b>Can thiệp Nội soi:</b> Bắt buộc (Chích cầm máu, kẹp clip cơ học, hoặc nhiệt).</li>
                    ${extraAction}
                    <li><b>Thuốc PPI:</b> Liều cao Tĩnh mạch trong 72 giờ (Bolus 80mg, sau đó truyền duy trì 8mg/h).</li>
                </ul>
            `;
        } else {
            resultBox.classList.add('info-box');
            treatment = `
                <strong>NHÓM NGUY CƠ THẤP</strong><br>
                Tỷ lệ tái xuất huyết: <b>${riskPercent}</b><br><br>
                <b>Phác đồ:</b>
                <ul>
                    <li><b>Can thiệp Nội soi:</b> Không cần thiết thực hiện thêm các biện pháp cầm máu nội soi.</li>
                    <li><b>Thuốc PPI:</b> Chuyển sang dùng PPI đường uống.</li>
                    <li><b>Quản lý:</b> Có thể cân nhắc cho xuất viện sớm.</li>
                </ul>
            `;
        }
        
        resultBox.innerHTML = treatment;
    }

    function treatVarice() {
        const state = document.getElementById('variceState').value;
        const resultBox = document.getElementById('variceResult');
        resultBox.style.display = 'block';
        resultBox.className = 'result-box';

        if(state === 'active') {
            resultBox.classList.add('warning-box');
            resultBox.innerHTML = `
                <strong>XỬ TRÍ CƠ BẢN (Trong 12h đầu)</strong>
                <ul>
                    <li><b>Thuốc giảm áp lực TMC:</b> Dùng ngay khi nghi ngờ (Terlipressin, Somatostatin, hoặc Octreotide). Kéo dài 3-5 ngày.</li>
                    <li><b>Kháng sinh phòng ngừa:</b> Bắt buộc trong 7 ngày (Norfloxacin uống 400mg x2, hoặc Ceftriaxone TM 1g nếu xơ gan nặng).</li>
                    <li><b>Nội soi can thiệp:</b> Thắt TMTQ bằng vòng cao su (EVL) hoặc chích keo (Cyanoacrylate) đối với TM dạ dày.</li>
                    <li><b>Ngừa hôn mê gan.</b></li>
                </ul>
            `;
        } else {
            resultBox.classList.add('danger-box');
            resultBox.innerHTML = `
                <strong>XỬ TRÍ CẤP CỨU Ồ ẠT / KHÁNG TRỊ</strong>
                <ul>
                    <li><b>Cầm máu tạm thời:</b> Chèn bóng Sengstaken-Blakemore hoặc Linton-Nachlas (Tuyệt đối không lưu quá 24h để tránh hoại tử/vỡ thực quản).</li>
                    <li><b>Chuẩn bị:</b> Đánh giá chuyển phẫu thuật tạo luồng thông cửa-chủ (Shunts) nếu nội soi cầm máu thất bại.</li>
                </ul>
            `;
        }
    }
</script>

</body>
</html>
