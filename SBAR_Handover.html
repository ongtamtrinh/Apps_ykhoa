<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SBAR Pro V3.0 - Master</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { 
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        darkBg: '#0f172a',
                        darkCard: '#1e293b'
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; transition: background-color 0.3s; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .emergency-pulse { animation: pulse-red 2s infinite; }
        @keyframes pulse-red { 0% { box-shadow: 0 0 0 0 rgba(220, 38, 38, 0.4); } 70% { box-shadow: 0 0 0 10px rgba(220, 38, 38, 0); } 100% { box-shadow: 0 0 0 0 rgba(220, 38, 38, 0); } }
        .tag-item { display: inline-flex; align-items: center; padding: 2px 8px; border-radius: 12px; font-size: 11px; font-weight: 600; margin-right: 4px; margin-bottom: 4px; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 dark:bg-darkBg dark:text-slate-100 min-h-screen">

    <header class="bg-white dark:bg-darkCard border-b dark:border-slate-700 sticky top-0 z-30 px-4 py-3 flex justify-between items-center shadow-sm">
        <div class="flex items-center gap-2">
            <div class="bg-blue-600 p-1.5 rounded-lg text-white font-bold text-xl">SB</div>
            <h1 class="text-lg font-extrabold tracking-tight">SBAR PRO <span class="text-blue-600 font-normal text-xs">V3.0</span></h1>
        </div>
        <div class="flex items-center gap-3">
            <button onclick="toggleDarkMode()" class="p-2 rounded-full hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors">
                <span id="dark-icon">🌙</span>
            </button>
            <input type="date" id="duty-date" onchange="loadData()" class="text-sm border rounded-lg px-2 py-1 dark:bg-slate-800 dark:border-slate-600">
        </div>
    </header>

    <main class="max-w-7xl mx-auto p-4 grid grid-cols-1 lg:grid-cols-12 gap-6">
        
        <div class="lg:col-span-4 space-y-4">
            <div class="bg-white dark:bg-darkCard p-5 rounded-2xl shadow-sm border dark:border-slate-700 relative">
                <div id="draft-indicator" class="hidden absolute top-3 right-3 text-[10px] text-orange-500 font-bold italic animate-pulse">Đang có bản nháp...</div>
                <h2 class="text-sm font-bold text-slate-400 uppercase tracking-widest mb-4">Thông tin bệnh nhân</h2>
                
                <div class="space-y-3">
                    <div class="grid grid-cols-3 gap-2">
                        <input type="text" id="room" placeholder="Phòng" class="border rounded-xl px-3 py-2 text-sm dark:bg-slate-800 dark:border-slate-600">
                        <input type="text" id="name" placeholder="Tên BN" class="col-span-2 border rounded-xl px-3 py-2 text-sm dark:bg-slate-800 dark:border-slate-600">
                    </div>
                    <input type="text" id="dx" placeholder="Chẩn đoán" class="w-full border rounded-xl px-3 py-2 text-sm dark:bg-slate-800 dark:border-slate-600">
                    
                    <div>
                        <label class="text-[10px] font-bold text-slate-400 ml-1">NỘI DUNG SBAR (Tình trạng, Diễn biến)</label>
                        <textarea id="content" rows="6" class="w-full border rounded-xl px-3 py-2 text-sm mt-1 dark:bg-slate-800 dark:border-slate-600 custom-scrollbar" placeholder="S: Tình trạng...&#10;B: Tiền sử...&#10;A: Đánh giá...&#10;R: Đề xuất..."></textarea>
                    </div>

                    <div>
                        <label class="text-[10px] font-bold text-slate-400 ml-1">THẺ GẮN (Gõ & Enter)</label>
                        <div id="tag-container" class="flex flex-wrap mt-1 mb-2"></div>
                        <input type="text" id="tag-input" placeholder="Thêm thẻ (vd: Thở máy...)" class="w-full border rounded-xl px-3 py-2 text-sm dark:bg-slate-800 dark:border-slate-600">
                    </div>

                    <div class="flex items-center gap-2 py-2">
                        <span class="text-xs font-bold text-slate-500">Mức độ:</span>
                        <select id="priority" class="text-xs border rounded-lg px-2 py-1 dark:bg-slate-800 dark:border-slate-600">
                            <option value="low">✅ Ổn định</option>
                            <option value="med">⚠️ Theo dõi</option>
                            <option value="high">🚨 Cấp cứu</option>
                        </select>
                    </div>

                    <div class="flex gap-2 pt-2">
                        <button onclick="savePatient()" id="btn-save" class="flex-1 bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 rounded-xl transition-all shadow-lg shadow-blue-200 dark:shadow-none">LƯU THÔNG TIN</button>
                        <button onclick="clearForm()" class="px-4 py-2 border rounded-xl hover:bg-slate-50 dark:hover:bg-slate-800 font-bold text-sm">HỦY</button>
                    </div>
                </div>
            </div>
        </div>

        <div class="lg:col-span-8">
            <div class="flex justify-between items-center mb-4">
                <h2 class="font-extrabold text-xl">Danh sách ca bệnh</h2>
                <div class="flex gap-2">
                    <button onclick="filterPriority('all')" class="text-[10px] font-bold px-3 py-1 bg-slate-200 dark:bg-slate-700 rounded-full">TẤT CẢ</button>
                    <button onclick="filterPriority('high')" class="text-[10px] font-bold px-3 py-1 bg-red-100 text-red-600 rounded-full">CẤP CỨU</button>
                </div>
            </div>
            
            <div id="patient-list" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                </div>
        </div>
    </main>

    <div id="detail-modal" class="fixed inset-0 z-50 hidden flex items-center justify-center p-4 bg-slate-900/60 backdrop-blur-sm">
        <div class="bg-white dark:bg-darkCard w-full max-w-lg rounded-3xl shadow-2xl overflow-hidden max-h-[90vh] flex flex-col">
            <div id="modal-header" class="p-5 text-white flex justify-between items-start">
                <div>
                    <h3 id="m-name" class="text-xl font-black">N/A</h3>
                    <p id="m-room" class="text-sm opacity-80 font-bold"></p>
                </div>
                <button onclick="closeModal()" class="text-2xl font-bold">&times;</button>
            </div>
            <div class="p-6 overflow-y-auto custom-scrollbar flex-1 space-y-4">
                <div id="m-tags" class="flex flex-wrap"></div>
                <div>
                    <h4 class="text-[10px] font-bold text-slate-400 uppercase mb-1">Nội dung SBAR</h4>
                    <p id="m-content" class="text-sm whitespace-pre-wrap leading-relaxed text-slate-700 dark:text-slate-300"></p>
                </div>
                <div class="border-t dark:border-slate-700 pt-4">
                    <h4 class="text-[10px] font-bold text-slate-400 uppercase mb-2">Checklist / Y lệnh</h4>
                    <div id="m-todo-list" class="space-y-2"></div>
                    <div class="flex mt-3 gap-2">
                        <input type="text" id="new-todo" placeholder="Thêm việc..." class="flex-1 text-sm border rounded-lg px-3 py-1 dark:bg-slate-800 dark:border-slate-600">
                        <button onclick="addTodo()" class="bg-slate-800 dark:bg-slate-100 dark:text-darkBg text-white px-3 py-1 rounded-lg font-bold text-sm">+</button>
                    </div>
                </div>
            </div>
            <div class="p-4 bg-slate-50 dark:bg-slate-800 flex justify-between gap-2">
                <button onclick="copyCurrentModal()" class="flex-1 py-2 bg-blue-100 text-blue-700 dark:bg-blue-900 dark:text-blue-100 rounded-xl font-bold text-sm">COPY SBAR</button>
                <button onclick="deleteCurrentPatient()" class="px-4 py-2 text-red-500 font-bold text-sm">XÓA</button>
            </div>
        </div>
    </div>

    <script>
        let patients = [];
        let currentEditingId = null; // Dành riêng cho Edit Form
        let currentViewingId = null; // Dành riêng cho Modal Detail
        let currentTags = [];

        // --- DARK MODE LOGIC ---
        function toggleDarkMode() {
            document.documentElement.classList.toggle('dark');
            const isDark = document.documentElement.classList.contains('dark');
            localStorage.setItem('sbar_theme', isDark ? 'dark' : 'light');
            document.getElementById('dark-icon').innerText = isDark ? '☀️' : '🌙';
        }

        // --- TAGS LOGIC ---
        const tagInput = document.getElementById('tag-input');
        tagInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && tagInput.value.trim()) {
                addTag(tagInput.value.trim());
                tagInput.value = '';
            }
        });

        function addTag(text) {
            if (!currentTags.includes(text)) {
                currentTags.push(text);
                renderFormTags();
                saveDraft(); // Lưu nháp khi thêm thẻ
            }
        }

        function removeTag(text) {
            currentTags = currentTags.filter(t => t !== text);
            renderFormTags();
            saveDraft();
        }

        function renderFormTags() {
            const container = document.getElementById('tag-container');
            container.innerHTML = currentTags.map(t => `
                <span class="tag-item bg-blue-100 text-blue-700 dark:bg-blue-900 dark:text-blue-100">
                    ${t} <button onclick="removeTag('${t}')" class="ml-1 text-xs font-black">×</button>
                </span>
            `).join('');
        }

        // --- AUTO-SAVE DRAFT LOGIC ---
        const formFields = ['room', 'name', 'dx', 'content', 'priority'];
        formFields.forEach(id => {
            document.getElementById(id).addEventListener('input', saveDraft);
        });

        function saveDraft() {
            if (currentEditingId) return; // Không lưu nháp khi đang ở chế độ Edit bệnh nhân cũ
            const draft = {
                room: document.getElementById('room').value,
                name: document.getElementById('name').value,
                dx: document.getElementById('dx').value,
                content: document.getElementById('content').value,
                priority: document.getElementById('priority').value,
                tags: currentTags
            };
            localStorage.setItem('sbar_draft', JSON.stringify(draft));
            document.getElementById('draft-indicator').classList.remove('hidden');
        }

        function loadDraft() {
            const draft = JSON.parse(localStorage.getItem('sbar_draft'));
            if (draft && !currentEditingId) {
                document.getElementById('room').value = draft.room || '';
                document.getElementById('name').value = draft.name || '';
                document.getElementById('dx').value = draft.dx || '';
                document.getElementById('content').value = draft.content || '';
                document.getElementById('priority').value = draft.priority || 'low';
                currentTags = draft.tags || [];
                renderFormTags();
                document.getElementById('draft-indicator').classList.remove('hidden');
            }
        }

        // --- CORE FUNCTIONS ---
        function savePatient() {
            const p = {
                id: currentEditingId || Date.now(),
                room: document.getElementById('room').value,
                name: document.getElementById('name').value,
                dx: document.getElementById('dx').value,
                content: document.getElementById('content').value,
                priority: document.getElementById('priority').value,
                tags: currentTags,
                todos: currentEditingId ? patients.find(x => x.id === currentEditingId).todos : [],
                time: new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})
            };

            if(!p.name) return alert("Vui lòng nhập tên bệnh nhân!");

            if(currentEditingId) {
                patients = patients.map(x => x.id === currentEditingId ? p : x);
            } else {
                patients.unshift(p);
            }

            saveToLocal();
            clearForm();
            renderPatients();
            localStorage.removeItem('sbar_draft'); // Xóa nháp sau khi lưu thật
            document.getElementById('draft-indicator').classList.add('hidden');
        }

        function renderPatients(filter = 'all') {
            const list = document.getElementById('patient-list');
            list.innerHTML = '';
            
            patients.filter(p => filter === 'all' || p.priority === filter).forEach(p => {
                const color = p.priority === 'high' ? 'border-l-red-500' : p.priority === 'med' ? 'border-l-amber-500' : 'border-l-emerald-500';
                const pulse = p.priority === 'high' ? 'emergency-pulse' : '';
                
                const tagsHtml = p.tags ? p.tags.map(t => `<span class="tag-item bg-slate-100 text-slate-600 dark:bg-slate-700 dark:text-slate-300">${t}</span>`).join('') : '';

                const div = document.createElement('div');
                div.className = `bg-white dark:bg-darkCard p-4 rounded-2xl shadow-sm border-l-4 ${color} ${pulse} cursor-pointer hover:scale-[1.02] transition-all border dark:border-slate-700`;
                div.onclick = () => showDetail(p.id);
                div.innerHTML = `
                    <div class="flex justify-between items-start mb-1">
                        <span class="text-[10px] font-black px-2 py-0.5 bg-slate-100 dark:bg-slate-800 rounded text-slate-500">P. ${p.room}</span>
                        <span class="text-[10px] text-slate-400 font-bold">${p.time}</span>
                    </div>
                    <h3 class="font-black text-lg uppercase truncate">${p.name}</h3>
                    <p class="text-xs text-blue-600 dark:text-blue-400 font-bold mb-2 truncate">${p.dx.toUpperCase()}</p>
                    <div class="flex flex-wrap mb-2">${tagsHtml}</div>
                    <div class="flex justify-between items-center mt-3">
                        <div class="flex -space-x-1">
                            ${p.todos.slice(0,3).map(t => `<div class="w-2 h-2 rounded-full ${t.done ? 'bg-emerald-400' : 'bg-slate-300'} border border-white"></div>`).join('')}
                        </div>
                        <button onclick="event.stopPropagation(); startEdit(${p.id})" class="text-[10px] font-bold text-slate-400 hover:text-blue-600">CHỈNH SỬA</button>
                    </div>
                `;
                list.appendChild(div);
            });
        }

        function startEdit(id) {
            const p = patients.find(x => x.id === id);
            currentEditingId = id;
            document.getElementById('room').value = p.room;
            document.getElementById('name').value = p.name;
            document.getElementById('dx').value = p.dx;
            document.getElementById('content').value = p.content;
            document.getElementById('priority').value = p.priority;
            currentTags = [...(p.tags || [])];
            renderFormTags();
            document.getElementById('btn-save').innerText = "CẬP NHẬT THÔNG TIN";
            document.getElementById('draft-indicator').classList.add('hidden');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function clearForm() {
            currentEditingId = null;
            currentTags = [];
            formFields.forEach(id => document.getElementById(id).value = '');
            renderFormTags();
            document.getElementById('btn-save').innerText = "LƯU THÔNG TIN";
            localStorage.removeItem('sbar_draft');
            document.getElementById('draft-indicator').classList.add('hidden');
        }

        function showDetail(id) {
            const p = patients.find(x => x.id === id);
            currentViewingId = id;
            const modal = document.getElementById('detail-modal');
            const header = document.getElementById('modal-header');
            
            header.className = `p-5 text-white flex justify-between items-start ${p.priority === 'high' ? 'bg-red-500' : p.priority === 'med' ? 'bg-amber-500' : 'bg-emerald-500'}`;
            document.getElementById('m-name').innerText = p.name.toUpperCase();
            document.getElementById('m-room').innerText = `PHÒNG: ${p.room} | ${p.dx.toUpperCase()}`;
            document.getElementById('m-content').innerText = p.content;
            document.getElementById('m-tags').innerHTML = (p.tags || []).map(t => `<span class="tag-item bg-white/20 text-white border border-white/30">${t}</span>`).join('');
            
            renderTodos();
            modal.classList.remove('hidden');
        }

        function renderTodos() {
            const p = patients.find(x => x.id === currentViewingId);
            const list = document.getElementById('m-todo-list');
            list.innerHTML = p.todos.map((t, i) => `
                <div class="flex items-center gap-3 p-2 rounded-xl bg-slate-50 dark:bg-slate-800 border dark:border-slate-700">
                    <input type="checkbox" ${t.done ? 'checked' : ''} onchange="toggleTodoDone(${i})" class="w-4 h-4 rounded">
                    <span class="text-sm ${t.done ? 'line-through text-slate-400' : 'font-semibold'}">${t.text}</span>
                </div>
            `).join('');
        }

        function addTodo() {
            const input = document.getElementById('new-todo');
            if(!input.value) return;
            const p = patients.find(x => x.id === currentViewingId);
            p.todos.push({ text: input.value, done: false });
            input.value = '';
            saveToLocal(); renderTodos(); renderPatients();
        }

        function toggleTodoDone(i) {
            const p = patients.find(x => x.id === currentViewingId);
            p.todos[i].done = !p.todos[i].done;
            saveToLocal(); renderTodos(); renderPatients();
        }

        function copyCurrentModal() {
            const p = patients.find(x => x.id === currentViewingId);
            const emoji = p.priority === 'high' ? '🚨' : p.priority === 'med' ? '⚠️' : '✅';
            const tagsTxt = (p.tags || []).length > 0 ? `[${p.tags.join(', ')}]` : '';
            let text = `${emoji} [SBAR - PHÒNG ${p.room}] ${tagsTxt}\nBN: ${p.name.toUpperCase()}\nΔ: ${p.dx.toUpperCase()}\n----------\n${p.content}\n----------\n📝 VIỆC CẦN LÀM:\n${p.todos.map(t => (t.done ? '✅ ' : '⬜ ') + t.text).join('\n') || '- Trống'}\n----------\n⏰ ${p.time}`;
            navigator.clipboard.writeText(text).then(() => alert("Đã copy nội dung bàn giao!"));
        }

        function saveToLocal() { localStorage.setItem(`shift_${document.getElementById('duty-date').value}`, JSON.stringify(patients)); }
        
        function loadData() { 
            patients = JSON.parse(localStorage.getItem(`shift_${document.getElementById('duty-date').value}`) || '[]'); 
            renderPatients(); 
        }

        function closeModal() { document.getElementById('detail-modal').classList.add('hidden'); currentViewingId = null; }
        
        function filterPriority(p) { renderPatients(p); }

        function deleteCurrentPatient() { 
            if(confirm("Xóa ca này?")) { 
                patients = patients.filter(x => x.id !== currentViewingId); 
                saveToLocal(); renderPatients(); closeModal(); 
            } 
        }

        window.onload = () => {
            // Load theme
            const savedTheme = localStorage.getItem('sbar_theme');
            if (savedTheme === 'dark') {
                document.documentElement.classList.add('dark');
                document.getElementById('dark-icon').innerText = '☀️';
            }

            const di = document.getElementById('duty-date');
            if(!di.value) di.value = new Date().toISOString().split('T')[0];
            loadData();
            loadDraft(); // Load bản nháp nếu có
        }
    </script>
</body>
</html>
