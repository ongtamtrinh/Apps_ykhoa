<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý Checklist Lâm Sàng</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        /* Tùy chỉnh thanh cuộn cho đẹp */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body class="h-screen flex flex-col md:flex-row overflow-hidden text-slate-800">

    <div class="w-full md:w-80 bg-white border-r border-slate-200 flex flex-col h-[30vh] md:h-full">
        <div class="p-4 border-b border-slate-200 bg-slate-50 flex justify-between items-center">
            <h1 class="font-bold text-lg text-blue-700">📋 Checklists</h1>
            <button onclick="createNewChecklist()" class="bg-blue-600 text-white w-8 h-8 rounded-full hover:bg-blue-700 flex items-center justify-center font-bold shadow-sm" title="Thêm mới">+</button>
        </div>
        
        <div class="p-3">
            <input type="text" id="searchInput" placeholder="Tìm kiếm..." class="w-full p-2 bg-slate-100 border-none rounded-lg text-sm focus:ring-2 focus:ring-blue-500 outline-none">
        </div>

        <div id="checklistSidebar" class="flex-1 overflow-y-auto p-2 space-y-1">
            <div class="text-center text-sm text-slate-500 mt-10">Đang kết nối Supabase...</div>
            </div>
    </div>

    <div class="flex-1 h-[70vh] md:h-full bg-slate-50 overflow-y-auto relative" id="mainContent">
        <div id="welcomeScreen" class="h-full flex flex-col items-center justify-center text-slate-400">
            <div class="text-6xl mb-4">🏥</div>
            <h2 class="text-xl font-semibold text-slate-600">Clinical Assistant Hub</h2>
            <p>Chọn một checklist bên trái hoặc bấm dấu + để tạo mới</p>
        </div>

        <div id="editScreen" class="hidden p-6 max-w-3xl mx-auto bg-white min-h-full shadow-sm">
            <div class="flex justify-between items-center mb-6 border-b pb-4">
                <h2 class="text-2xl font-bold" id="formTitle">Chỉnh sửa Checklist</h2>
                <div class="flex gap-2">
                    <button onclick="cancelEdit()" class="px-4 py-2 text-sm text-slate-600 bg-slate-100 hover:bg-slate-200 rounded-lg font-medium transition-colors">Hủy</button>
                    <button onclick="saveChecklistToSupabase()" class="px-4 py-2 text-sm text-white bg-green-600 hover:bg-green-700 rounded-lg font-medium shadow-sm transition-colors">💾 Lưu Thay Đổi</button>
                </div>
            </div>

            <div class="space-y-4 mb-8">
                <div>
                    <label class="block text-sm font-semibold text-slate-600 mb-1">Tên Checklist</label>
                    <input type="text" id="editTitle" placeholder="VD: Cấp cứu Phản vệ" class="w-full p-3 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none font-bold text-lg">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-slate-600 mb-1">Chuyên khoa / Phân loại</label>
                    <input type="text" id="editCategory" placeholder="VD: Cấp cứu, Nội khoa..." class="w-full p-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                </div>
            </div>

            <div>
                <div class="flex justify-between items-center mb-4">
                    <h3 class="font-bold text-slate-700">Các bước thực hiện</h3>
                    <button onclick="addStep()" class="text-sm bg-blue-50 text-blue-600 px-3 py-1 rounded-md hover:bg-blue-100 font-medium transition-colors">+ Thêm bước</button>
                </div>
                
                <div id="stepsContainer" class="space-y-3">
                    </div>
            </div>
            
            <div class="mt-10 pt-6 border-t border-red-100 text-right" id="deleteZone">
                <button onclick="deleteChecklist()" class="text-sm text-red-600 hover:underline">Xóa Checklist này</button>
            </div>
        </div>
    </div>

    <script>
        // --- 1. KẾT NỐI SUPABASE ---
        const SUPABASE_URL = 'https://jcistmhaalbjdrmzwfyu.supabase.co'; 
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpjaXN0bWhhYWxiamRybXp3Znl1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU5NTIzNDUsImV4cCI6MjA5MTUyODM0NX0.RCMwDElQ1vKOpdj08IdtpVvmyZKww6EIaVLoqhbF-9U';
        
        // Đã đổi tên biến thành supabaseClient để không bị trùng với thư viện gốc
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // --- 2. BIẾN TOÀN CỤC ---
        let allChecklists = [];
        let currentEditId = null;
        let currentSteps = [];

        // --- 3. LẤY DỮ LIỆU TỪ SUPABASE ---
        async function fetchChecklists() {
            try {
                const { data, error } = await supabaseClient
                    .from('checklists')
                    .select('*')
                    .order('created_at', { ascending: false });

                if (error) throw error;
                
                allChecklists = data;
                renderSidebar(allChecklists);
            } catch (err) {
                console.error("Lỗi Supabase:", err);
                document.getElementById('checklistSidebar').innerHTML = 
                    `<div class="p-4 text-red-500 text-sm bg-red-50 rounded">Lỗi: ${err.message}</div>`;
            }
        }

        // --- 4. RENDER CỘT TRÁI (DANH SÁCH) ---
        function renderSidebar(list) {
            const container = document.getElementById('checklistSidebar');
            container.innerHTML = '';

            if(list.length === 0) {
                container.innerHTML = `<div class="p-4 text-center text-slate-400 text-sm">Chưa có dữ liệu. Bấm dấu + để tạo mới.</div>`;
                return;
            }

            list.forEach(item => {
                const stepCount = item.content ? item.content.length : 0;
                container.innerHTML += `
                    <div onclick="openEditMode('${item.id}')" class="p-3 bg-white hover:bg-blue-50 rounded-lg cursor-pointer border border-transparent hover:border-blue-200 transition-colors mb-1">
                        <div class="font-semibold text-slate-800 text-sm mb-1 line-clamp-1">${item.title}</div>
                        <div class="flex justify-between items-center text-[11px] text-slate-500">
                            <span class="bg-slate-100 px-2 py-0.5 rounded">${item.category || 'Chưa phân loại'}</span>
                            <span>${stepCount} bước</span>
                        </div>
                    </div>
                `;
            });
        }

        // --- 5. CHỨC NĂNG TÌM KIẾM ---
        document.getElementById('searchInput').addEventListener('input', (e) => {
            const keyword = e.target.value.toLowerCase();
            const filtered = allChecklists.filter(item => 
                item.title.toLowerCase().includes(keyword) || 
                (item.category && item.category.toLowerCase().includes(keyword))
            );
            renderSidebar(filtered);
        });

        // --- 6. MỞ MÀN HÌNH CHỈNH SỬA / TẠO MỚI ---
        function openEditMode(id) {
            document.getElementById('welcomeScreen').classList.add('hidden');
            document.getElementById('editScreen').classList.remove('hidden');

            const checklist = allChecklists.find(c => c.id === id);
            currentEditId = checklist.id;
            
            document.getElementById('formTitle').innerText = "Chỉnh sửa Checklist";
            document.getElementById('editTitle').value = checklist.title;
            document.getElementById('editCategory').value = checklist.category || "";
            document.getElementById('deleteZone').style.display = "block"; // Hiện nút xóa

            // Clone mảng steps để sửa
            currentSteps = checklist.content ? JSON.parse(JSON.stringify(checklist.content)) : [];
            renderSteps();
        }

        function createNewChecklist() {
            document.getElementById('welcomeScreen').classList.add('hidden');
            document.getElementById('editScreen').classList.remove('hidden');
            
            currentEditId = null; // Báo hiệu đây là tạo mới
            document.getElementById('formTitle').innerText = "✨ Tạo Checklist Mới";
            document.getElementById('editTitle').value = "";
            document.getElementById('editCategory').value = "";
            document.getElementById('deleteZone').style.display = "none"; // Ẩn nút xóa
            
            currentSteps = [
                { task: "", note: "" } // Tạo sẵn 1 bước trống
            ];
            renderSteps();
        }

        function cancelEdit() {
            document.getElementById('editScreen').classList.add('hidden');
            document.getElementById('welcomeScreen').classList.remove('hidden');
        }

        // --- 7. QUẢN LÝ CÁC BƯỚC (STEPS) TRONG FORM ---
        function renderSteps() {
            const container = document.getElementById('stepsContainer');
            container.innerHTML = '';

            currentSteps.forEach((step, index) => {
                container.innerHTML += `
                    <div class="flex gap-3 items-start p-3 bg-slate-50 border border-slate-200 rounded-xl group relative">
                        <div class="mt-2 text-slate-400 font-bold w-5">${index + 1}.</div>
                        <div class="flex-1 space-y-2">
                            <input type="text" value="${step.task || ''}" onchange="updateStep(${index}, 'task', this.value)" placeholder="Hành động (VD: Tiêm bắp Adrenaline 0.5mg)" class="w-full p-2 text-sm border border-slate-300 rounded font-medium focus:ring-1 focus:ring-blue-500 outline-none">
                            <input type="text" value="${step.note || ''}" onchange="updateStep(${index}, 'note', this.value)" placeholder="Ghi chú thêm (Tùy chọn. VD: Tiêm mặt ngoài đùi)" class="w-full p-2 text-xs border border-transparent bg-transparent hover:bg-white hover:border-slate-300 rounded text-slate-500 italic focus:ring-1 focus:ring-blue-500 outline-none transition-colors">
                        </div>
                        <button onclick="removeStep(${index})" class="text-red-400 hover:text-red-600 p-2 opacity-0 group-hover:opacity-100 transition-opacity" title="Xóa bước này">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                        </button>
                    </div>
                `;
            });
        }

        function addStep() {
            currentSteps.push({ task: "", note: "" });
            renderSteps();
        }

        function updateStep(index, field, value) {
            currentSteps[index][field] = value;
        }

        function removeStep(index) {
            currentSteps.splice(index, 1);
            renderSteps();
        }

        // --- 8. LƯU LÊN SUPABASE ---
        async function saveChecklistToSupabase() {
            const title = document.getElementById('editTitle').value.trim();
            const category = document.getElementById('editCategory').value.trim();

            if (!title) {
                alert("Vui lòng nhập Tên Checklist!");
                return;
            }

            // Lọc bỏ các bước trống (không có task)
            const validSteps = currentSteps.filter(s => s.task.trim() !== "");

            const payload = {
                title: title,
                category: category,
                content: validSteps
            };

            // Lấy đối tượng nút vừa bấm (sửa lỗi event window cũ)
            const saveBtn = window.event ? window.event.target : null;
            let originalText = "";
            if (saveBtn) {
                originalText = saveBtn.innerHTML;
                saveBtn.innerHTML = "⏳ Đang lưu...";
                saveBtn.disabled = true;
            }

            try {
                if (currentEditId) {
                    const { error } = await supabaseClient.from('checklists').update(payload).eq('id', currentEditId);
                    if (error) throw error;
                } else {
                    const { error } = await supabaseClient.from('checklists').insert([payload]);
                    if (error) throw error;
                }
                
                fetchChecklists(); // Tải lại danh sách
                cancelEdit(); // Đóng form
            } catch (err) {
                alert("Có lỗi khi lưu: " + err.message);
            } finally {
                if (saveBtn) {
                    saveBtn.innerHTML = originalText;
                    saveBtn.disabled = false;
                }
            }
        }

        // --- 9. XÓA CHECKLIST ---
        async function deleteChecklist() {
            if(!confirm("Bạn có chắc chắn muốn xóa Checklist này vĩnh viễn?")) return;

            try {
                const { error } = await supabaseClient.from('checklists').delete().eq('id', currentEditId);
                if (error) throw error;
                
                fetchChecklists();
                cancelEdit();
            } catch (err) {
                alert("Lỗi khi xóa: " + err.message);
            }
        }

        // --- KHỞI ĐỘNG ỨNG DỤNG ---
        fetchChecklists();
    </script>
</body>
</html>
