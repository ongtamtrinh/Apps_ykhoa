<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clinical Assistant Hub | Professional</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .sticky-nav { position: sticky; top: 0; z-index: 50; background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border-bottom: 1px solid #e2e8f0; }
        .app-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); border: 1px solid #e2e8f0; display: flex; flex-direction: column; height: 100%; }
        .app-card:hover { transform: translateY(-4px); box-shadow: 0 12px 20px -5px rgba(0, 0, 0, 0.1); border-color: #3b82f6; }
        .filter-scroll::-webkit-scrollbar { display: none; }
        .active-filter { background-color: #1e40af !important; color: white !important; }
        .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    </style>
</head>
<body class="text-slate-800 pb-12">

    <header class="bg-slate-900 text-white pt-10 pb-24">
        <div class="max-w-6xl mx-auto px-6">
            <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-6 mb-10">
                <div>
                    <h1 class="text-3xl font-bold tracking-tight flex items-center">
                        <span class="text-blue-400 mr-3">⚕️</span> Clinical Assistant Hub
                    </h1>
                    <p class="text-slate-400 mt-2 text-sm">Hệ thống hỗ trợ ra quyết định lâm sàng dành cho nhân viên y tế</p>
                </div>
                <div class="bg-slate-800 px-4 py-2 rounded-lg border border-slate-700">
                    <span class="text-xs font-mono text-blue-300">v2.1.0-Stable</span>
                </div>
            </div>
            
            <div class="relative max-w-2xl">
                <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                    <svg class="h-5 w-5 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                </div>
                <input type="text" id="searchInput" placeholder="Tìm tên bệnh, chuyên khoa hoặc từ khóa..." 
                    class="w-full pl-12 pr-4 py-4 rounded-xl text-slate-900 focus:outline-none focus:ring-4 focus:ring-blue-500/30 shadow-2xl transition-all" 
                    oninput="renderApps()">
            </div>
        </div>
    </header>

    <nav class="sticky-nav mb-8">
        <div class="max-w-6xl mx-auto px-4">
            <div class="flex items-center gap-2 overflow-x-auto py-4 filter-scroll" id="categoryFilter">
                <button onclick="setFilter('All', this)" class="filter-btn whitespace-nowrap px-4 py-2 rounded-lg text-sm font-semibold bg-white text-slate-600 border border-slate-200 hover:border-blue-400 active-filter transition-all">Tất cả</button>
                <button onclick="setFilter('Chung', this)" class="filter-btn whitespace-nowrap px-4 py-2 rounded-lg text-sm font-semibold bg-white text-slate-600 border border-slate-200 hover:border-blue-400 transition-all">Chung</button>
                <button onclick="setFilter('Hồi Sức', this)" class="filter-btn whitespace-nowrap px-4 py-2 rounded-lg text-sm font-semibold bg-white text-slate-600 border border-slate-200 hover:border-blue-400 transition-all">Hồi Sức</button>
                <button onclick="setFilter('Truyền Nhiễm', this)" class="filter-btn whitespace-nowrap px-4 py-2 rounded-lg text-sm font-semibold bg-white text-slate-600 border border-slate-200 hover:border-blue-400 transition-all">Truyền Nhiễm</button>
                <button onclick="setFilter('Nội Tiết', this)" class="filter-btn whitespace-nowrap px-4 py-2 rounded-lg text-sm font-semibold bg-white text-slate-600 border border-slate-200 hover:border-blue-400 transition-all">Nội Tiết</button>
                <button onclick="setFilter('Tim mạch', this)" class="filter-btn whitespace-nowrap px-4 py-2 rounded-lg text-sm font-semibold bg-white text-slate-600 border border-slate-200 hover:border-blue-400 transition-all">Tim mạch</button>
                <button onclick="setFilter('Tiêu Hóa', this)" class="filter-btn whitespace-nowrap px-4 py-2 rounded-lg text-sm font-semibold bg-white text-slate-600 border border-slate-200 hover:border-blue-400 transition-all">Tiêu Hóa</button>
                <button onclick="setFilter('Thận & Tiết niệu', this)" class="filter-btn whitespace-nowrap px-4 py-2 rounded-lg text-sm font-semibold bg-white text-slate-600 border border-slate-200 hover:border-blue-400 transition-all">Thận & Tiết niệu</button>
                <button onclick="setFilter('Hô hấp', this)" class="filter-btn whitespace-nowrap px-4 py-2 rounded-lg text-sm font-semibold bg-white text-slate-600 border border-slate-200 hover:border-blue-400 transition-all">Hô hấp</button>
                <button onclick="setFilter('Thần kinh', this)" class="filter-btn whitespace-nowrap px-4 py-2 rounded-lg text-sm font-semibold bg-white text-slate-600 border border-slate-200 hover:border-blue-400 transition-all">Thần kinh</button>
                <button onclick="setFilter('Ngoại khoa', this)" class="filter-btn whitespace-nowrap px-4 py-2 rounded-lg text-sm font-semibold bg-white text-slate-600 border border-slate-200 hover:border-blue-400 transition-all">Ngoại khoa</button>
                <button onclick="setFilter('Sản phụ khoa', this)" class="filter-btn whitespace-nowrap px-4 py-2 rounded-lg text-sm font-semibold bg-white text-slate-600 border border-slate-200 hover:border-blue-400 transition-all">Sản phụ khoa</button>
                <button onclick="setFilter('Ung thư', this)" class="filter-btn whitespace-nowrap px-4 py-2 rounded-lg text-sm font-semibold bg-white text-slate-600 border border-slate-200 hover:border-blue-400 transition-all">Ung thư</button>
            </div>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto px-6">
        <div id="favSection" class="hidden mb-12">
            <h2 class="text-xs font-bold uppercase tracking-widest text-slate-400 mb-4 flex items-center">
                <svg class="w-4 h-4 mr-2 text-yellow-500" fill="currentColor" viewBox="0 0 20 20"><path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z"></path></svg>
                Công cụ hay dùng
            </h2>
            <div id="favGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
            <div class="h-px bg-slate-200 mt-10"></div>
        </div>

        <div id="appGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 mt-4"></div>

        <div id="noResults" class="hidden text-center py-20 bg-white rounded-3xl border-2 border-dashed border-slate-200">
            <p class="text-slate-400 text-lg">Không tìm thấy công cụ phù hợp với từ khóa này.</p>
        </div>
    </main>

    <script>
        // DANH SÁCH 23 ỨNG DỤNG ĐẦY ĐỦ TỪ FILE GỐC
        const apps = [
            { title: "Sàng lọc bệnh tại Cấp Cứu", desc: "Sàng lọc phân loại bệnh nhân tại khoa Cấp Cứu.", icon: "🔍", file: "Sanglocbenh.html", category: "Chung", color: "blue" },
            { title: "Clinical Scores", desc: "Đánh giá nhanh các thang điểm lâm sàng phổ biến.", icon: "🔎", file: "Clinical_Scores.html", category: "Chung", color: "slate" },
            { title: "SBAR Handover", desc: "Báo cáo truyền đạt thông tin y tế theo chuẩn SBAR.", icon: "📝", file: "SBAR_Handover.html", category: "Chung", color: "neutral" },
            { title: "Dinh dưỡng nội trú", desc: "Tư vấn chế độ dinh dưỡng cho bệnh nhân nằm viện.", icon: "🍚", file: "Tuvan_dinhduong.html", category: "Chung", color: "gray" },
            { title: "Rối Loạn Điện Giải", desc: "Xử trí Hạ/Tăng Na+, K+, Ca2+... Tính bù dịch & y lệnh.", icon: "💧", file: "Xutri_Roiloandiengiai.html", category: "Hồi Sức", color: "blue" },
            { title: "Hồi sinh tim phổi", desc: "Hỗ trợ phản ứng nhanh ngưng tuần hoàn - ACLS 2025.", icon: "🚑", file: "ACLS.html", category: "Hồi Sức", color: "red" },
            { title: "Ngộ độc cấp", desc: "Tiếp cận và xử trí ban đầu bệnh nhân ngộ độc cấp.", icon: "💊", file: "Tiepcan_Ngodoc.html", category: "Hồi Sức", color: "purple" },
            { title: "Quản lý Phản vệ", desc: "Phác đồ xử trí phản vệ theo hướng dẫn mới nhất.", icon: "📋", file: "Quanly_phanve.html", category: "Hồi Sức", color: "green" },
            { title: "Quản Lý Xơ Gan", desc: "Tính điểm MELD, Child-Pugh & xử trí biến chứng xơ gan.", icon: "🧪", file: "Quanly_xogan.html", category: "Tiêu Hóa", color: "orange" },
            { title: "Phân Tích Khí Máu (ABG)", desc: "Đánh giá thăng bằng toan kiềm & khoảng trống Anion.", icon: "🫁", file: "Phantich_KMDM.html", category: "Hồi Sức", color: "sky" },
            { title: "Vận Mạch & Co Bóp", desc: "Tính liều, tốc độ bơm tiêm điện & sinh y lệnh tự động.", icon: "🫀", file: "Quanly_Vanmach&cobopcotim.html", category: "Hồi Sức", color: "red" },
            { title: "Sepsis SSC 2026", desc: "Quản lý nhiễm khuẩn huyết theo Surviving Sepsis 2026.", icon: "🚨", file: "Sepsis_Master_SSC2026.html", category: "Hồi Sức", color: "orange" },
            { title: "Quản lý Suy Hô Hấp", desc: "Phác đồ xử trí suy hô hấp cấp tính.", icon: "🫁", file: "Quanly_SHH.html", category: "Hô hấp", color: "sky" },
            { title: "Kháng sinh WHO 2023", desc: "Tra cứu phác đồ kháng sinh chuẩn AWare, WHO 2023.", icon: "💊", file: "Luachon_KS_aware_WHO2023.html", category: "Truyền Nhiễm", color: "indigo" },
            { title: "Kháng sinh Wellington ICU", desc: "Tra cứu phác đồ kháng sinh chuẩn Wellington ICU.", icon: "💊", file: "Luachon_KS_WellingtonICU.html", category: "Truyền Nhiễm", color: "indigo" },
            { title: "Truyền Dịch SXH", desc: "Phác đồ truyền dịch Sốt xuất huyết Dengue (BYT 2023).", icon: "🦟", file: "Tinhlieu_truyendichsxh.html", category: "Truyền Nhiễm", color: "blue" },
            { title: "Viêm Gan B & C", desc: "Quản lý điều trị viêm gan siêu vi theo AASLD 2024.", icon: "🦠", file: "Quanly_VGSVB&C.html", category: "Tiêu Hóa", color: "teal" },
            { title: "Quản lý XHTH Trên", desc: "Xử trí xuất huyết tiêu hóa cao do vỡ giãn hoặc loét.", icon: "🩸", file: "Quanly_XHTH.html", category: "Tiêu Hóa", color: "red" },
            { title: "Đái tháo đường nội viện", desc: "Sàng lọc và chỉnh liều insulin cho bệnh nhân nội viện.", icon: "🩸", file: "Dieuchinh_duonghuyet.html", category: "Nội Tiết", color: "purple" },
            { title: "Thận & Tiết niệu", desc: "Dashboard quản lý và theo dõi bệnh thận - tiết niệu.", icon: "🧬", file: "Nephrology_Dashboard.html", category: "Thận & Tiết niệu", color: "cyan" },
            { title: "Quản lý đột quỵ", desc: "Phản ứng và đánh giá toàn diện các trường hợp đột quỵ.", icon: "🧠", file: "Quanly_dotquy.html", category: "Thần kinh", color: "pink" },
            { title: "Thuốc Tim Mạch", desc: "Quản lý thuốc THA, suy tim, hội chứng vành mạn.", icon: "💊", file: "Quanly_thuoc_timmach.html", category: "Tim mạch", color: "red" },
            { title: "Hội chứng vành cấp", desc: "Quản lý và theo dõi STEMI/NSTEMI/ACS.", icon: "🫀", file: "Quanly_hoichungvanhcap.html", category: "Tim mạch", color: "orange" },
            { title: "Phân loại TNM Ung thư", desc: "Tra cứu phân độ giai đoạn TNM trong ung thư.", icon: "🎗️", file: "tnm_ungthu.html", category: "Ung thư", color: "blue" },
            { title: "Thư viện tra cứu", desc: "Thư viện tra cứu các công cụ y khoa.", icon: "📚", file: "Thuvientracuu.html", category: "Chung", color: "slate" },
            { title: "Quản lý Checklists", desc: "Tạo và chỉnh sửa các bảng kiểm lâm sàng theo phác đồ.", icon: "📋", file: "checklists.html", category: "Công cụ", color: "blue" }
        ];

        let currentCategory = 'All';
        let pinnedApps = JSON.parse(localStorage.getItem('medPinned')) || [];

        function setFilter(category, btn) {
            currentCategory = category;
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active-filter'));
            btn.classList.add('active-filter');
            renderApps();
        }

        function togglePin(title) {
            if (pinnedApps.includes(title)) {
                pinnedApps = pinnedApps.filter(t => t !== title);
            } else {
                pinnedApps.push(title);
            }
            localStorage.setItem('medPinned', JSON.stringify(pinnedApps));
            renderApps();
        }

        function renderApps() {
            const grid = document.getElementById('appGrid');
            const favGrid = document.getElementById('favGrid');
            const favSection = document.getElementById('favSection');
            const noResults = document.getElementById('noResults');
            const query = document.getElementById('searchInput').value.toLowerCase();
            
            grid.innerHTML = '';
            favGrid.innerHTML = '';
            let count = 0;
            let favCount = 0;

            apps.forEach(app => {
                const isPinned = pinnedApps.includes(app.title);
                const matchCat = currentCategory === 'All' || app.category === currentCategory;
                const matchSearch = app.title.toLowerCase().includes(query) || app.desc.toLowerCase().includes(query) || app.category.toLowerCase().includes(query);

                const cardHtml = `
                    <div class="app-card bg-white rounded-2xl p-5 border-t-4 border-t-${app.color}-500 relative group">
                        <button onclick="togglePin('${app.title}')" class="absolute top-4 right-4 ${isPinned ? 'text-yellow-500' : 'text-slate-300'} hover:scale-110 transition-transform">
                            <svg class="w-6 h-6" fill="${isPinned ? 'currentColor' : 'none'}" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11.049 2.927c.3-.921 1.603-.921 1.902 0l1.519 4.674a1 1 0 00.95.69h4.915c.969 0 1.371 1.24.588 1.81l-3.976 2.888a1 1 0 00-.363 1.118l1.518 4.674c.3.922-.755 1.688-1.538 1.118l-3.976-2.888a1 1 0 00-1.176 0l-3.976 2.888c-.783.57-1.838-.197-1.538-1.118l1.518-4.674a1 1 0 00-.363-1.118l-3.976-2.888c-.784-.57-.382-1.81.588-1.81h4.914a1 1 0 00.951-.69l1.519-4.674z"></path></svg>
                        </button>
                        <div class="flex-grow">
                            <div class="flex items-center gap-3 mb-3">
                                <span class="text-3xl">${app.icon}</span>
                                <span class="text-[10px] font-bold uppercase tracking-wider bg-slate-100 text-slate-500 px-2 py-1 rounded">${app.category}</span>
                            </div>
                            <h3 class="text-lg font-bold text-slate-800 mb-1 group-hover:text-blue-600 transition-colors">${app.title}</h3>
                            <p class="text-sm text-slate-500 line-clamp-2">${app.desc}</p>
                        </div>
                        <a href="./${app.file}" class="mt-6 block w-full text-center py-2.5 bg-slate-50 hover:bg-blue-600 hover:text-white text-blue-700 font-bold rounded-xl transition-all border border-slate-200 hover:border-blue-600 shadow-sm">
                            Mở ứng dụng
                        </a>
                    </div>
                `;

                if (matchSearch) {
                    if (isPinned && query === "" && currentCategory === 'All') {
                        favGrid.innerHTML += cardHtml;
                        favCount++;
                    }
                    if (matchCat) {
                        grid.innerHTML += cardHtml;
                        count++;
                    }
                }
            });

            favSection.style.display = (favCount > 0) ? 'block' : 'none';
            noResults.style.display = (count === 0 && favCount === 0) ? 'block' : 'none';
        }

        renderApps();
    </script>
</body>
</html>
